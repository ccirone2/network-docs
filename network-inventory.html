<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#0f172a">
<title>Home Network Inventory</title>
<style>

  :root {
    --bg: #f4f6fb;
    --bg-grid: #e6ebf4;
    --surface: #ffffff;
    --surface-2: #f8fafc;
    --border: #dfe5ee;
    --border-strong: #c8d2e1;
    --text: #0f172a;
    --text-muted: #56627a;
    --text-faint: #8390a8;
    --accent: #0ea5a4;
    --accent-strong: #0b7c7b;
    --accent-soft: #d6f5f4;
    --indigo: #4f46e5;
    --indigo-soft: #e6e7ff;
    --warning: #b45309;
    --warning-soft: #fef3c7;
    --danger: #b91c1c;
    --danger-soft: #fee2e2;
    --success: #15803d;
    --success-soft: #dcfce7;
    --slate: #334155;
    --slate-soft: #e2e8f0;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 28px;
    --space-7: 40px;

    --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05);
    --shadow-md: 0 6px 20px -8px rgba(15, 23, 42, .15);
    --shadow-lg: 0 24px 60px -20px rgba(15, 23, 42, .25);

    --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--font-sans);
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 100% -10%, #e7f6f5 0, transparent 60%),
      radial-gradient(900px 500px at -10% 10%, #eef0ff 0, transparent 60%),
      var(--bg);
    background-attachment: fixed;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
    font-size: 15px;
  }

  a { color: var(--accent-strong); text-decoration: none; }
  a:hover { text-decoration: underline; }

  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; font-size: 15px; color: var(--text); }
  textarea { resize: vertical; }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  header.topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .topbar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-3) var(--space-4);
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    min-width: 0;
    position: relative;
  }
  .brand-mark {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent) 0%, var(--indigo) 100%);
    display: grid; place-items: center;
    color: #fff; font-weight: 700; font-family: var(--font-mono); font-size: 14px;
    box-shadow: var(--shadow-sm);
    flex-shrink: 0;
  }
  .brand-text { display: flex; flex-direction: column; min-width: 0; }
  .brand-text .title { font-weight: 700; letter-spacing: -0.01em; font-size: 16px; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .brand-text .sub { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .net-switcher {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    padding: var(--space-1) var(--space-2) var(--space-1) var(--space-1);
    cursor: pointer;
    min-width: 0;
    text-align: left;
    color: inherit;
    font: inherit;
    transition: background .15s ease, border-color .15s ease;
  }
  .net-switcher:hover { background: var(--surface-2); border-color: var(--border); }
  .net-switcher[aria-expanded="true"] { background: var(--surface-2); border-color: var(--border-strong); }
  .net-switcher .chevron {
    color: var(--text-muted);
    flex-shrink: 0;
    transition: transform .15s ease;
  }
  .net-switcher[aria-expanded="true"] .chevron { transform: rotate(180deg); }

  .popover {
    position: absolute;
    top: calc(100% + var(--space-2));
    left: 0;
    min-width: 280px;
    max-width: calc(100vw - 24px);
    max-height: calc(100dvh - 80px);
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    z-index: 50;
    padding: var(--space-1);
    animation: popIn .15s cubic-bezier(.2,.8,.2,1);
  }
  .popover[hidden] { display: none; }
  .popover .pop-section {
    padding: var(--space-2) var(--space-3) var(--space-1);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-faint);
    font-weight: 700;
  }
  .popover .pop-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    width: 100%;
    border: 0;
    background: transparent;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: inherit;
    color: var(--text);
    text-align: left;
    transition: background .12s ease, color .12s ease;
  }
  .popover .pop-item:hover { background: var(--surface-2); }
  .popover .pop-item:active { background: var(--slate-soft); }
  .popover .pop-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; background: var(--surface-2); }
  .popover .pop-item.current { background: var(--accent-soft); color: var(--accent-strong); font-weight: 600; }
  .popover .pop-item .check {
    width: 16px; height: 16px;
    display: inline-grid; place-items: center;
    color: var(--accent);
    flex-shrink: 0;
  }
  .popover .pop-item .check.is-empty { color: transparent; }
  .popover .pop-item .label {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .popover .pop-item .meta {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
    flex-shrink: 0;
    font-family: var(--font-mono);
  }
  .popover .pop-item.current .meta { color: var(--accent-strong); }
  .popover hr { border: 0; border-top: 1px solid var(--border); margin: var(--space-1) 0; }

  .topbar-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }

  nav.tabs {
    background: rgba(255, 255, 255, 0.6);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  .tabs-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 var(--space-2);
    display: flex;
    gap: var(--space-1);
  }
  .tab {
    appearance: none;
    background: transparent;
    border: 0;
    padding: var(--space-3) var(--space-4);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color .15s ease, border-color .15s ease, background .15s ease;
    border-radius: 0;
  }
  .tab:hover { color: var(--text); border-bottom-color: var(--border-strong); }
  .tab:active { color: var(--text); }
  .tab:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -4px;
    border-radius: var(--radius-sm);
  }
  .tab[aria-selected="true"] {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .tab[aria-selected="true"]:hover { border-bottom-color: var(--accent); }
  .tab .count {
    display: inline-block;
    margin-left: var(--space-2);
    padding: 1px 6px;
    border-radius: 999px;
    background: var(--slate-soft);
    color: var(--slate);
    font-size: 11px;
    font-weight: 600;
  }
  .tab[aria-selected="true"] .count {
    background: var(--accent-soft);
    color: var(--accent-strong);
  }

  main.content {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    padding: var(--space-5) var(--space-4) var(--space-7);
    flex: 1;
  }

  footer.foot {
    border-top: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.6);
    color: var(--text-muted);
    font-size: 12px;
    padding: var(--space-4);
    text-align: center;
  }

  .btn {
    appearance: none;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: var(--space-2) var(--space-3);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    transition: background .15s ease, border-color .15s ease, transform .05s ease, box-shadow .15s ease;
    line-height: 1;
    min-height: 36px;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--text-muted); }
  .btn:active { transform: translateY(1px); box-shadow: none; }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn:disabled,
  .btn[disabled] {
    opacity: .5;
    cursor: not-allowed;
    background: var(--surface-2);
    color: var(--text-muted);
    border-color: var(--border);
  }
  .btn:disabled:hover,
  .btn[disabled]:hover { background: var(--surface-2); border-color: var(--border); transform: none; }

  .btn.primary {
    background: var(--text);
    border-color: var(--text);
    color: var(--surface);
  }
  .btn.primary:hover { background: var(--slate); border-color: var(--slate); }

  .btn.accent {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--surface);
  }
  .btn.accent:hover { background: var(--accent-strong); border-color: var(--accent-strong); }

  .btn.ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-muted);
  }
  .btn.ghost:hover { background: var(--slate-soft); color: var(--text); }

  .btn.danger {
    color: var(--danger);
    border-color: var(--danger-soft);
    background: var(--surface);
  }
  .btn.danger:hover { background: var(--danger-soft); border-color: var(--danger); }

  .btn.sm {
    padding: var(--space-1) var(--space-2);
    font-size: 12px;
    min-height: 28px;
  }

  .icon-btn {
    width: 36px; height: 36px;
    padding: 0;
    display: inline-grid;
    place-items: center;
  }
  .icon-btn svg { width: 18px; height: 18px; }

  .filters-bar {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    padding: var(--space-5) var(--space-4) 0;
  }
  .filters-bar:empty { display: none; }
  .filters-bar + main.content { padding-top: 0; }
  .search-row {
    display: flex;
    gap: var(--space-2);
    align-items: center;
    margin-bottom: var(--space-4);
    flex-wrap: wrap;
  }
  .search {
    position: relative;
    flex: 1 1 220px;
    min-width: 0;
  }
  .search input {
    width: 100%;
    padding: var(--space-2) var(--space-3) var(--space-2) 36px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-md);
    font-size: 14px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search svg {
    position: absolute;
    left: var(--space-3);
    top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-faint);
    pointer-events: none;
  }
  .search-hint {
    color: var(--text-faint);
    font-size: 12px;
    margin-bottom: var(--space-4);
    margin-top: calc(var(--space-2) * -1);
  }

  .filter-row {
    display: flex;
    gap: var(--space-2);
    flex-wrap: wrap;
    margin-bottom: var(--space-4);
  }
  .filter-chip {
    appearance: none;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    padding: var(--space-1) var(--space-3);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
    font-family: inherit;
  }
  .filter-chip:hover { background: var(--surface-2); color: var(--text); border-color: var(--text-muted); }
  .filter-chip:active { transform: translateY(1px); }
  .filter-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .filter-chip.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--surface);
  }
  .filter-chip.active:hover { background: #1f2937; border-color: #1f2937; color: #fff; }

  .section-header {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin-bottom: var(--space-4);
    flex-wrap: wrap;
  }
  .section-header h2 {
    margin: 0;
    font-size: 20px;
    letter-spacing: -0.01em;
  }
  .section-header .desc {
    color: var(--text-muted);
    font-size: 13px;
  }
  .section-header .spacer { flex: 1; }

  .grid {
    display: grid;
    gap: var(--space-4);
    grid-template-columns: 1fr;
    align-items: start;
  }
  @media (min-width: 560px) {
    .grid.cols-2 { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .grid.tiles { grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
    box-shadow: var(--shadow-sm);
    transition: box-shadow .15s ease, transform .15s ease;
  }
  .card.tight { padding: var(--space-3) var(--space-4); }
  .card.elevated { box-shadow: var(--shadow-md); }
  .card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
    margin-bottom: var(--space-3);
  }
  .card-title {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
    margin: 0;
    overflow-wrap: anywhere;
  }
  .card-sub {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 2px;
    font-family: var(--font-mono);
    overflow-wrap: anywhere;
  }
  .card-actions {
    margin-left: auto;
    display: flex;
    gap: var(--space-1);
    flex-shrink: 0;
  }

  .host-group { margin-bottom: var(--space-5); }
  .host-group:last-child { margin-bottom: 0; }
  .host-group-header {
    display: flex;
    align-items: baseline;
    gap: var(--space-2);
    padding: 0 0 var(--space-2);
    margin-bottom: var(--space-3);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .host-group-header h3 { min-width: 0; overflow-wrap: anywhere; }
  .host-group-header h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
  }
  .host-group-header .host-group-id {
    color: var(--text-faint);
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .host-group-header .spacer { flex: 1; }

  .chips { display: inline-flex; flex-wrap: wrap; gap: var(--space-1); }
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 2px var(--space-2);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    background: var(--slate-soft);
    color: var(--slate);
    line-height: 1.6;
    letter-spacing: .02em;
    font-family: var(--font-mono);
  }
  .chip.accent { background: var(--accent-soft); color: var(--accent-strong); }
  .chip.indigo { background: var(--indigo-soft); color: var(--indigo); }
  .chip.warning { background: var(--warning-soft); color: var(--warning); }
  .chip.danger { background: var(--danger-soft); color: var(--danger); }
  .chip.success { background: var(--success-soft); color: var(--success); }
  .chip.outline { background: transparent; border: 1px solid var(--border-strong); color: var(--text-muted); }
  .chip.mini { padding: 1px 6px; font-size: 10px; line-height: 1.5; }

  .dot {
    display: inline-block; width: 4px; height: 4px;
    border-radius: 50%; background: var(--text-faint);
    vertical-align: middle; margin: 0 var(--space-1);
    flex-shrink: 0;
  }

  .vlan-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4);
    box-shadow: var(--shadow-sm);
    transition: box-shadow .15s ease, border-color .15s ease;
  }
  .vlan-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }
  .vlan-card .vc-head {
    display: flex; align-items: baseline; gap: var(--space-2);
    flex-wrap: wrap;
  }
  .vlan-card .vc-id { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
  .vlan-card .vc-name { color: var(--text-muted); font-size: 13px; }
  .vlan-card .vc-tag { color: var(--text-faint); font-family: var(--font-mono); font-size: 11px; }
  .vlan-card .vc-actions { margin-left: auto; display: flex; gap: var(--space-1); }
  .vlan-card .vc-net {
    font-family: var(--font-mono); font-size: 14px; color: var(--text);
    margin: var(--space-2) 0 var(--space-2);
  }
  .vlan-card .vc-net.is-empty { color: var(--text-faint); }
  .vlan-card .vc-foot {
    display: flex; align-items: center; gap: var(--space-1) var(--space-2);
    flex-wrap: wrap; font-size: 12px; color: var(--text-muted);
  }
  .vlan-card .vc-foot .range { font-family: var(--font-mono); }

  .host-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: var(--space-4);
    box-shadow: var(--shadow-sm);
    transition: box-shadow .15s ease, border-color .15s ease;
  }
  .host-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }
  .host-card .hc-top {
    display: flex; align-items: flex-start; gap: var(--space-3);
  }
  .host-card .hc-id-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1 1 auto; }
  .host-card .hc-name {
    font-weight: 700; font-size: 18px; letter-spacing: -0.01em;
    line-height: 1.15; overflow-wrap: anywhere;
  }
  .host-card .hc-host-l {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--text-muted); overflow-wrap: anywhere;
  }
  .host-card .hc-host-l .host-id-faint { color: var(--text-faint); margin-left: var(--space-1); }
  .host-card .hc-mgmt {
    text-align: right; font-family: var(--font-mono);
    flex-shrink: 0; min-width: 0;
  }
  .host-card .hc-mgmt .ip {
    font-size: 16px; font-weight: 700; color: var(--text);
    overflow-wrap: anywhere;
  }
  .host-card .hc-mgmt .ip.is-empty { color: var(--text-faint); font-weight: 500; }
  .host-card .hc-mgmt .vlan {
    display: block; margin-top: 2px;
    font-size: 11px; color: var(--text-muted);
  }
  .host-card .hc-actions {
    margin-left: var(--space-2); display: flex; gap: var(--space-1); flex-shrink: 0;
  }
  .host-card .hc-tags {
    margin-top: var(--space-2);
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .host-card .hc-foot {
    margin-top: var(--space-2);
    font-size: 12px; color: var(--text-muted);
    display: flex; flex-wrap: wrap;
    gap: 4px var(--space-2); align-items: center;
  }
  .host-card .hc-foot b {
    color: var(--text); font-weight: 600; font-family: var(--font-mono);
  }
  .host-card .hc-section {
    margin-top: var(--space-3);
    padding-top: var(--space-3);
    border-top: 1px solid var(--border);
  }
  .host-card .hc-section h5 {
    margin: 0 0 var(--space-2);
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-muted); font-weight: 600;
    display: flex; align-items: center; gap: var(--space-2);
  }
  .host-card .hc-section h5 .add { margin-left: auto; }

    border-radius: var(--radius-md);
    background: var(--surface-2);
    padding: var(--space-3);
    margin-bottom: var(--space-3);
  }
  .nested-list-header {
    display: flex; align-items: center; gap: var(--space-2);
    margin-bottom: var(--space-2);
  }
  .nested-list-header h4 {
    margin: 0; font-size: 13px; font-weight: 600; color: var(--text);
  }
  .nested-list-header .count {
    color: var(--text-faint); font-size: 12px;
  }

  .nested-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: var(--space-3);
    display: grid;
    gap: 4px;
    margin-bottom: var(--space-2);
  }
  .nested-item:last-child { margin-bottom: 0; }
  .nested-item .top {
    display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap;
  }
  .nested-item .top strong { font-size: 13px; }
  .nested-item .top .nested-actions { margin-left: auto; display: flex; gap: var(--space-1); }
  .nested-item .meta { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); overflow-wrap: anywhere; }

  .secret {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-family: var(--font-mono);
    background: var(--slate-soft);
    border-radius: var(--radius-sm);
    padding: 2px var(--space-2);
    font-size: 12px;
  }
  .secret .reveal-btn {
    border: 0;
    background: transparent;
    cursor: pointer;
    color: var(--text-muted);
    width: 18px; height: 18px;
    display: grid; place-items: center;
    padding: 0;
    border-radius: 4px;
    transition: color .12s ease, background .12s ease;
  }
  .secret .reveal-btn:hover { color: var(--text); background: rgba(15, 23, 42, .06); }
  .secret .reveal-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .secret-warn {
    display: inline-flex; align-items: center; gap: var(--space-1);
    color: var(--warning);
    font-size: 11px;
    font-weight: 600;
    margin-bottom: var(--space-2);
  }

  .toast-wrap {
    position: fixed;
    left: 50%;
    bottom: max(var(--space-4), env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 100;
    pointer-events: none;
    display: flex; flex-direction: column; gap: var(--space-2);
    align-items: center;
  }
  .toast {
    pointer-events: auto;
    background: var(--text);
    color: var(--surface);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    animation: toastIn .2s ease, toastOut .25s ease 2.6s forwards;
    display: inline-flex; align-items: center; gap: var(--space-2);
  }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); }
  @keyframes toastIn {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes toastOut {
    to { transform: translateY(8px); opacity: 0; }
  }

  @media (max-width: 480px) {
    .topbar-inner { padding: var(--space-2) var(--space-3); }
    main.content { padding: var(--space-4) var(--space-3) var(--space-7); }
    .brand-text .sub { display: none; }
    .summary-tile .value { font-size: 22px; }
    .topbar-actions .btn span.lbl { display: none; }
    .topbar-actions .btn { padding: 8px; }
  }

  hr.sep { border: 0; border-top: 1px solid var(--border); margin: var(--space-4) 0; }
  .muted { color: var(--text-muted); }
  .mono { font-family: var(--font-mono); }
  .nowrap { white-space: nowrap; }
  .saved-flash { animation: flash .8s ease; }
  @keyframes flash {
    0%, 100% { background-color: transparent; }
    20% { background-color: var(--success-soft); }
  }

  .visually-hidden {
    position: absolute !important;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }
</style>
</head>

const Crypto = (() => {
  const enc = new TextEncoder();
  const dec = new TextDecoder();
  const unb64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

  let derivedKey = null;
  let sourceMode = "plain";
  const cache = new Map();

  function isEncryptedBlob(v) {
    return !!v && typeof v === "object" && !Array.isArray(v)
      && Object.keys(v).length === 2
      && typeof v.iv === "string" && typeof v.ct === "string";
  }

  async function unlock(passphrase, kdf) {
    const salt = unb64(kdf.salt);
    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
    derivedKey = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: kdf.iterations, hash: kdf.hash || "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },

      ["encrypt", "decrypt"]
    );

    return pt;

    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv }, derivedKey, enc.encode(plaintext));
    return {
      iv: btoa(String.fromCharCode(...iv)),
      ct: btoa(String.fromCharCode(...new Uint8Array(ct)))
    };
  }

  function lock() { derivedKey = null; cache.clear(); sourceMode = "plain"; }
  function isUnlocked() { return derivedKey !== null; }
  function isEncryptedSession() { return sourceMode === "encrypted"; }
  function peek(cacheKey) { return cache.get(cacheKey); }
  function setCache(cacheKey, plaintext) { cache.set(cacheKey, plaintext); }
  function clearCache(cacheKey) { if (cacheKey == null) cache.clear(); else cache.delete(cacheKey); }

  return { unlock, decryptField, encryptField, lock, isUnlocked, isEncryptedSession, isEncryptedBlob, peek, setCache, clearCache };
})();

let lastKdf = null;

function findFirstBlob(obj, path = []) {
  if (Crypto.isEncryptedBlob(obj)) return { blob: obj, path };
  if (obj && typeof obj === "object") {
    for (const k of Object.keys(obj)) {
      const r = findFirstBlob(obj[k], path.concat(k));
      if (r) return r;
    }
  }
  return null;
}

function findFirstBlobInActiveNetwork() {
  return findFirstBlob(state);
}

function hasEncryptedBlobs(d) {
  for (const net of Object.values(d?.networks || {})) {
    for (const c of Object.values(net?.credentials || {})) {
      if (Crypto.isEncryptedBlob(c.password)) return true;
    }
  }
  return false;
}

function emptyConnectedTo() {
  return { host_id: "", interface: "", via_bridge: "", via_tag: null };
}

function normalizeConnectedTo(c) {
  if (!c || typeof c !== "object") return emptyConnectedTo();
  const tagRaw = c.via_tag;
  let tag = null;
  if (typeof tagRaw === "number" && Number.isFinite(tagRaw)) tag = tagRaw;
  else if (typeof tagRaw === "string" && tagRaw.trim() !== "" && /^\d+$/.test(tagRaw.trim())) tag = parseInt(tagRaw, 10);
  return {
    host_id: c.host_id ?? "",
    interface: c.interface ?? "",
    via_bridge: c.via_bridge ?? "",
    via_tag: tag
  };
}

function formatConnectedTo(ct) {
  if (!ct || !ct.host_id) return "";
  let s = String(ct.host_id);
  if (ct.interface) s += ":" + String(ct.interface);
  const parens = [];
  if (ct.via_bridge) parens.push("via " + ct.via_bridge);
  if (ct.via_tag != null && ct.via_tag !== "") parens.push("tag=" + ct.via_tag);
  if (parens.length) s += " (" + parens.join(", ") + ")";
  return s;
}

function connectedToMatches(ct, q) {
  if (!ct) return false;
  if ((ct.host_id || "").toLowerCase().includes(q)) return true;
  if ((ct.interface || "").toLowerCase().includes(q)) return true;
  if ((ct.via_bridge || "").toLowerCase().includes(q)) return true;
  if (ct.via_tag != null && String(ct.via_tag).toLowerCase().includes(q)) return true;
  return false;
}

function slugify(s) {
  return String(s || "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "")
    .slice(0, 60);
}

function randomId(prefix, existing) {
  const buf = new Uint8Array(3);
  for (let attempt = 0; attempt < 10000; attempt++) {
    crypto.getRandomValues(buf);
    let hex = "";
    for (let i = 0; i < buf.length; i++) hex += buf[i].toString(16).padStart(2, "0");
    const id = `${prefix}_${hex}`;
    if (!existing || !existing[id]) return id;
  }
  throw new Error(`could not allocate fresh ${prefix}_ id`);
}

function isValidIp(s) {
  if (!s) return false;
  const stripped = String(s).trim().split("/")[0];
  const parts = stripped.split(".");
  if (parts.length !== 4) return false;
  return parts.every(p => /^\d+$/.test(p) && +p >= 0 && +p <= 255);
}

function isValidCidr(s) {
  if (!s) return false;
  const [ip, mask] = String(s).trim().split("/");
  if (!ip || mask === undefined) return false;
  if (!isValidIp(ip)) return false;
  return /^\d+$/.test(mask) && +mask >= 0 && +mask <= 32;
}

function parseCidr(s) {
  if (!s) return null;
  const [ip, mask] = String(s).trim().split("/");
  if (!ip || mask === undefined) return null;
  if (!isValidIp(ip)) return null;
  if (!/^\d+$/.test(mask)) return null;
  const prefix = parseInt(mask, 10);
  if (prefix < 0 || prefix > 32) return null;
  return { address: ip, prefix };
}

function normalizeIp(ip) {
  if (typeof ip === "string") {
    const parsed = parseCidr(ip);
    if (parsed) return parsed;
    if (isValidIp(ip)) return { address: ip.trim(), prefix: null };
    return { address: String(ip || ""), prefix: null };
  }
  if (ip && typeof ip === "object") {
    const prefix = (typeof ip.prefix === "number" && ip.prefix >= 0 && ip.prefix <= 32) ? ip.prefix : null;
    return { address: ip.address ?? "", prefix };
  }
  return { address: "", prefix: null };
}

function formatCidr(o) {
  if (!o || !o.address) return "";
  if (o.prefix == null) return String(o.address);
  return String(o.address) + "/" + String(o.prefix);
}

function formatVlanGateway(v) {
  if (!v || !v.gateway_ip) return "";
  if (v.subnet_prefix == null) return v.gateway_ip;
  return v.gateway_ip + "/" + v.subnet_prefix;
}

function formatSoftware(sw) {
  if (!sw || !sw.name) return "";
  const inside = [];
  if (sw.edition) inside.push(sw.edition);
  if (sw.version) inside.push(sw.version);
  if (sw.kernel) inside.push("kernel " + sw.kernel);
  return inside.length ? `${sw.name} (${inside.join(", ")})` : sw.name;
}

function formatHardware(h) {
  if (!h) return "";
  const parts = [];
  if (h.manufacturer) parts.push(h.manufacturer);
  if (h.model) parts.push(h.model);
  return parts.join(" ");
}

function hostDisplayLabel(h, id) {
  const base = h?.display_name || id;
  if (h?.vm_id) {
    const where = h.hosted_on ? ` on ${h.hosted_on}` : "";
    return `${base} (VM ${h.vm_id}${where})`;
  }
  return base;
}

function sortedVlanIds() {
  return Object.keys(state.vlans).sort((a, b) => {
    const ta = state.vlans[a]?.tag;
    const tb = state.vlans[b]?.tag;
    if (typeof ta === "number" && typeof tb === "number") return ta - tb;
    if (typeof ta === "number") return -1;
    if (typeof tb === "number") return 1;
    return a.localeCompare(b);
  });
}

function vlanLabel(vid) {
  const v = state.vlans[vid];
  if (!v) return vid;
  const tag = (typeof v.tag === "number") ? `tag ${v.tag}` : "no tag";
  const name = v.name || "";
  return `${vid} (${tag})${name ? " — " + name : ""}`;
}

let data  = loadData();
let state = data.networks[data.activeNetworkId];

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seedData();
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || parsed.schemaVersion !== SCHEMA_VERSION) {
      toast("Unsupported schemaVersion — expected " + SCHEMA_VERSION, "error");
      return seedData();
    }
    return normalizeData(parsed);
  } catch (e) {
    console.warn("Failed to load saved data, using seed.", e);
    return seedData();
  }
}

function normalizeData(d) {
  if (!d || typeof d !== "object") return seedData();

  if (d.networks && typeof d.networks === "object") {
    const networks = {};
    for (const [k, v] of Object.entries(d.networks)) {
      networks[k] = normalizeNetwork(v);
    }
    let activeId = d.activeNetworkId;
    if (!activeId || !networks[activeId]) activeId = Object.keys(networks)[0];
    if (!activeId) {
      networks["default"] = emptyNetwork("Default");
      activeId = "default";
    }
    return { schemaVersion: SCHEMA_VERSION, networks, activeNetworkId: activeId };
  }
  if (d.network || d.vlans || d.hosts || d.credentials) {
    const single = normalizeNetwork(d);
    const id = randomId("n", {});
    return { schemaVersion: SCHEMA_VERSION, networks: { [id]: single }, activeNetworkId: id };
  }
  return seedData();
}

function normalizeNetwork(d) {
  const out = {
    network: {
      name: d?.network?.name ?? d?.name ?? "",
      description: d?.network?.description ?? d?.description ?? ""
    },
    vlans: {},
    hosts: {},
    credentials: {}
  };
  if (d?.vlans && typeof d.vlans === "object") {
    for (const [k, v] of Object.entries(d.vlans)) {
      out.vlans[k] = {
        name: v?.name ?? "",
        tag: (typeof v?.tag === "number" && v.tag >= 1 && v.tag <= 4094) ? v.tag : null,
        gateway_ip: v?.gateway_ip ?? "",
        subnet_prefix: (typeof v?.subnet_prefix === "number" && v.subnet_prefix >= 0 && v.subnet_prefix <= 32) ? v.subnet_prefix : null,
        dhcp: !!v?.dhcp,
        dhcp_range_start: v?.dhcp_range_start ?? "",
        dhcp_range_end: v?.dhcp_range_end ?? ""
      };
    }
  }
  if (d?.credentials && typeof d.credentials === "object") {
    for (const [k, v] of Object.entries(d.credentials)) {
      const er = v?.external_ref && typeof v.external_ref === "object" ? v.external_ref : {};
      out.credentials[k] = {
        type: CREDENTIAL_TYPES.includes(v?.type) ? v.type : "shell",
        username: v?.username ?? "",
        password: (typeof v?.password === "object" && Crypto.isEncryptedBlob(v.password)) ? v.password : (v?.password ?? ""),
        external_ref: {
          provider: er.provider ?? "",
          id: er.id ?? ""
        },
        notes: v?.notes ?? ""
      };
    }
  }
  if (d?.hosts && typeof d.hosts === "object") {
    for (const [k, v] of Object.entries(d.hosts)) {
      const sw = v?.software && typeof v.software === "object" ? v.software : {};
      out.hosts[k] = {
        kind: HOST_KINDS.includes(v?.kind) ? v.kind : "physical",
        role: HOST_ROLES.includes(v?.role) ? v.role : "other",
        display_name: v?.display_name ?? "",
        hostname: v?.hostname ?? "",
        aliases: Array.isArray(v?.aliases) ? v.aliases.slice() : [],
        hosted_on: v?.hosted_on ?? "",
        vm_id: v?.vm_id ?? "",
        software: {
          name: sw?.name ?? "",
          version: sw?.version ?? "",
          kernel: sw?.kernel ?? "",
          edition: sw?.edition ?? "",
          notes: sw?.notes ?? ""
        },
        manufacturer: v?.manufacturer ?? "",
        model: v?.model ?? "",
        hardware_revision: v?.hardware_revision ?? "",
        management_vlan: v?.management_vlan ?? "",
        management_ip: v?.management_ip ?? "",
        credential_ref: v?.credential_ref ?? "",
        interfaces: Array.isArray(v?.interfaces) ? v.interfaces.map(i => ({
          name: i?.name ?? "",
          type: INTERFACE_TYPES.includes(i?.type) ? i.type : "ethernet",
          mode: INTERFACE_MODES.includes(i?.mode) ? i.mode : "access",
          mac: i?.mac ?? "",
          parent: i?.parent ?? "",
          connected_to: normalizeConnectedTo(i?.connected_to),
          access_vlan: i?.access_vlan ?? "",
          native_vlan: i?.native_vlan ?? "",
          allowed_vlans: Array.isArray(i?.allowed_vlans) ? i.allowed_vlans.slice() : [],
          ip_addresses: Array.isArray(i?.ip_addresses) ? i.ip_addresses.map(normalizeIp) : []
        })) : [],
        services: Array.isArray(v?.services) ? (() => {
          const usedIds = {};
          return v.services.map(svc => {
            let sid = (typeof svc?.id === "string" && svc.id.trim()) ? svc.id.trim() : "";
            if (!sid || usedIds[sid]) sid = randomId("s", usedIds);
            usedIds[sid] = true;
            return {
              id: sid,
              name: svc?.name ?? "",
              display_name: svc?.display_name ?? "",
              category: SERVICE_CATEGORIES.includes(svc?.category) ? svc.category : "application",
              protocol: PROTOCOLS.includes(svc?.protocol) ? svc.protocol : "https",
              listen_ip: svc?.listen_ip ?? "",
              port: svc?.port ?? "",
              url: svc?.url ?? "",
              credential_ref: svc?.credential_ref ?? ""
            };
          });
        })() : [],
        links: Array.isArray(v?.links) ? v.links.map(l => ({
          label: l?.label ?? "",
          url: l?.url ?? ""
        })) : [],
        peripherals: Array.isArray(v?.peripherals) ? v.peripherals.map(p => ({
          slot: p?.slot ?? "",
          usb_vid_pid: p?.usb_vid_pid ?? "",
          description: p?.description ?? "",
          kind: PERIPHERAL_KINDS.includes(p?.kind) ? p.kind : "usb"
        })) : [],
        identifiers: Array.isArray(v?.identifiers) ? v.identifiers.map(it => ({
          kind: IDENTIFIER_KINDS.includes(it?.kind) ? it.kind : "other",
          value: it?.value ?? "",
          label: it?.label ?? ""
        })) : []
      };
    }
  }
  return out;
}


function validateRefs(net) {
  if (!net) return [];
  const rows = [];
  const vlanIds = new Set(Object.keys(net.vlans || {}));
  const hostIds = new Set(Object.keys(net.hosts || {}));
  const credIds = new Set(Object.keys(net.credentials || {}));
  for (const [hid, ep] of Object.entries(net.hosts || {})) {
    if (ep.management_vlan && !vlanIds.has(ep.management_vlan)) {
      rows.push({ from: `host:${hid}`, field: "management_vlan", expected_id: ep.management_vlan, kind: "vlan" });
    }
    if (ep.hosted_on && !hostIds.has(ep.hosted_on)) {
      rows.push({ from: `host:${hid}`, field: "hosted_on", expected_id: ep.hosted_on, kind: "host" });
    }
    if (ep.credential_ref && !credIds.has(ep.credential_ref)) {
      rows.push({ from: `host:${hid}`, field: "credential_ref", expected_id: ep.credential_ref, kind: "credential" });
    }
    (ep.interfaces || []).forEach(iface => {
      const tag = `host:${hid}/iface:${iface.name || "?"}`;
      const ct = iface.connected_to;
      if (ct && ct.host_id) {
        if (!hostIds.has(ct.host_id)) {
          rows.push({ from: tag, field: "connected_to.host_id", expected_id: ct.host_id, kind: "host" });
        } else if (ct.interface) {
          const target = net.hosts[ct.host_id];
          const found = (target.interfaces || []).some(i => i.name === ct.interface);
          if (!found) {
            rows.push({ from: tag, field: "connected_to.iface_name", expected_id: `${ct.host_id}:${ct.interface}`, kind: "interface" });
          }
        }
      }
      if (iface.access_vlan && !vlanIds.has(iface.access_vlan)) {
        rows.push({ from: tag, field: "access_vlan", expected_id: iface.access_vlan, kind: "vlan" });
      }
      if (iface.native_vlan && !vlanIds.has(iface.native_vlan)) {
        rows.push({ from: tag, field: "native_vlan", expected_id: iface.native_vlan, kind: "vlan" });
      }
      (iface.allowed_vlans || []).forEach(v => {
        if (v && !vlanIds.has(v)) {
          rows.push({ from: tag, field: "allowed_vlans[]", expected_id: v, kind: "vlan" });
        }
      });
    });
    (ep.services || []).forEach(svc => {
      if (svc.credential_ref && !credIds.has(svc.credential_ref)) {
        rows.push({ from: `host:${hid}/svc:${svc.id || svc.name || "?"}`, field: "credential_ref", expected_id: svc.credential_ref, kind: "credential" });
      }
    });
  }
  return rows;
}

function reportDanglingRefs(rows) {
  if (!rows || rows.length === 0) return;
  toast(`${rows.length} dangling reference${rows.length === 1 ? "" : "s"} — see console`, "error");
  try { console.table(rows); } catch (_) { console.warn("Dangling refs:", rows); }
}

function validateAllNetworks(d) {

  }
  return all;
}

function openModal({ title, sub = "", body, onSave, saveLabel = "Save", saveKind = "accent", onDelete = null, deleteLabel = "Delete" }) {

      modalEl.close();

  else modalEl.setAttribute("open", "");

    if (focusable) focusable.focus();
  }, 60);
}

function openPassphraseModal({ onUnlock, onCancel, errorText } = {}) {
  const body = document.createElement("div");
  body.innerHTML = `
    <div class="field">
      <label for="pp_input">Passphrase</label>
      <input type="password" id="pp_input" autocomplete="off" required>
    </div>
    <div class="pp-err" role="alert" style="color: var(--danger); font-size: 12px; margin-top: var(--space-2); min-height: 1em;"></div>
  `;

  openModal({
    title: "Unlock encrypted file",
    sub: "Enter the passphrase to decrypt this inventory.",
    body,
    saveLabel: "Unlock",
    saveKind: "accent",
    onSave: () => false
  });

  const input = $("#pp_input");
  const err = body.querySelector(".pp-err");
  if (errorText) err.textContent = errorText;

  input.addEventListener("input", () => { modalFormDirty = false; });

  let unlocked = false;

  $("#modal-form").onsubmit = async (e) => {
    e.preventDefault();
    const pp = input.value;
    let result;
    try {
      result = await onUnlock(pp);
    } catch {
      result = "Unlock failed";
    }
    if (typeof result === "string") {
      err.textContent = result;
      input.value = "";
      input.focus();
      return;
    }
    if (result) {
      unlocked = true;
      modalFormDirty = false;
      modalEl.close();
    }
  };

  const onClose = () => {
    modalEl.removeEventListener("close", onClose);
    if (!unlocked && typeof onCancel === "function") onCancel();
  };
  modalEl.addEventListener("close", onClose);
}

function promptUnlockForReveal() {
  return new Promise(resolve => {
    openPassphraseModal({
      onUnlock: async (pp) => {
        try {
          if (!lastKdf) { resolve(); return "Missing KDF parameters"; }
          await Crypto.unlock(pp, lastKdf);
          const probe = findFirstBlobInActiveNetwork();
          if (probe) {
            await Crypto.decryptField(probe.blob, "__probe__");
            Crypto.clearCache("__probe__");
          }
          resolve();
          return true;
        } catch {
          Crypto.lock();
          return "Incorrect passphrase";
        }
      },
      onCancel: () => resolve()
    });
  });
}

function confirmDelete({ title, message, onConfirm, okLabel = "Delete" }) {
  $("#confirm-title").textContent = title;
  $("#confirm-body").innerHTML = "";
  const p = document.createElement("p");
  p.style.margin = "0";
  p.style.fontSize = "14px";
  p.style.color = "var(--text-muted)";
  p.textContent = message;
  $("#confirm-body").appendChild(p);
  $("#confirm-ok").textContent = okLabel;
  if (typeof confirmEl.showModal === "function") confirmEl.showModal();
  else confirmEl.setAttribute("open", "");
  const okBtn = $("#confirm-ok");
  const onOk = () => { confirmEl.close(); onConfirm(); cleanup(); };
  const onCancel = () => { confirmEl.close(); cleanup(); };
  function cleanup() {
    okBtn.removeEventListener("click", onOk);
    $("#confirm-cancel").removeEventListener("click", onCancel);
  }
  okBtn.addEventListener("click", onOk);
  $("#confirm-cancel").addEventListener("click", onCancel);
}

  switcherBtn.setAttribute("aria-expanded", "false");

function categoryChip(cat) {
  if (!cat || cat === "application") return "";
  const cls = cat === "management" ? "warning"
            : cat === "infrastructure" ? "indigo"
            : "outline";
  return `<span class="chip ${cls}">${escapeHtml(cat)}</span>`;
}

function credentialTypeChip(type) {
  if (!type) return "";
  const cls = type === "shell"    ? "indigo"
            : type === "web"      ? "accent"
            : type === "api"      ? "success"
            : type === "console"  ? "warning"
            : type === "snmp"     ? "outline"
            : type === "database" ? "danger"
            :                       "outline";
  return `<span class="chip ${cls}">${escapeHtml(type)}</span>`;
}

function selectOptions(values, selected, allowEmpty = true, emptyLabel = "—") {
  const opts = [];
  if (allowEmpty) opts.push(`<option value="">${escapeHtml(emptyLabel)}</option>`);
  values.forEach(v => {
    const isObj = typeof v === "object";
    const val = isObj ? v.value : v;
    const lab = isObj ? v.label : v;
    opts.push(`<option value="${escapeHtml(val)}" ${val === selected ? "selected" : ""}>${escapeHtml(lab)}</option>`);
  });
  return opts.join("");
}

          pt = await Crypto.decryptField(c.password, `${data.activeNetworkId}:${id}`);
        } catch {
          toast("Decryption failed", "error");
          return;
        }
      } else {
        pt = c.password || "";
      }
      if (!pt) { toast("No password to copy", "info"); return; }
      try {
        await navigator.clipboard.writeText(pt);
      } catch {
        toast("Clipboard write failed", "error");
        return;
      }
      toast("Password copied. Clipboard will clear in 30s (best effort).", "success");
      setTimeout(() => { navigator.clipboard.writeText("").catch(() => {}); }, 30000);
    } catch {
      toast("Copy failed", "error");
    }
  },
  "add-iface":      (el) => openInterfaceForm(el.dataset.hostId),
  "add-svc":        (el) => openServiceForm(el.dataset.hostId),
  "edit-iface":     (el) => openInterfaceForm(el.dataset.hostId, +el.dataset.idx),
  "del-iface":      (el) => deleteInterface(el.dataset.hostId, +el.dataset.idx),
  "edit-svc":       (el) => openServiceForm(el.dataset.hostId, +el.dataset.idx),
  "del-svc":        (el) => deleteService(el.dataset.hostId, +el.dataset.idx),
  "map-toggle":     (el) => toggleMapNode(el.dataset.nodeId),
  "map-jump-hosts-vlan": (el) => {
    const vid = el.dataset.vlanId;
    const members = Object.keys(state.hosts).filter(hid => state.hosts[hid].management_vlan === vid).sort();
    jumpToLayer("hosts", null, members);
  },
  "map-jump-hosts": (el) => jumpToLayer("hosts", el.dataset.hostId, [el.dataset.hostId]),
  "map-jump-devices": (el) => jumpToLayer("devices", el.dataset.hostId, [el.dataset.hostId]),
  "map-jump-services": (el) => jumpToLayer("services", el.dataset.hostId, [el.dataset.hostId])
};

let searchDebounceTimer = null;

function buildSearchRow({ placeholder, hint, addBtn }) {
  const bar = $("#filters-bar");
  if (bar.dataset.tab === activeTab && bar.querySelector(".search-row")) {
    const existingInput = bar.querySelector(".search input");
    if (existingInput && existingInput.placeholder !== placeholder) existingInput.placeholder = placeholder;
    if (existingInput && existingInput.value !== searchQuery && document.activeElement !== existingInput) existingInput.value = searchQuery;
    return;
  }
  bar.innerHTML = "";
  bar.dataset.tab = activeTab;
  const wrap = document.createElement("div");
  const row = document.createElement("div");
  row.className = "search-row";
  row.innerHTML = `
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" placeholder="${escapeHtml(placeholder)}" value="${escapeHtml(searchQuery)}" autocomplete="off">
    </div>
  `;
  if (addBtn) {
    const b = document.createElement("button");
    b.className = "btn accent";
    b.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>${escapeHtml(addBtn.label)}</span>`;
    b.addEventListener("click", addBtn.onClick);
    row.appendChild(b);
  }
  const input = row.querySelector("input");
  input.addEventListener("input", (e) => {
    const next = e.target.value;
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      searchDebounceTimer = null;
      if (searchQuery === next) return;
      searchQuery = next;
      render();
    }, 120);
  });
  wrap.appendChild(row);
  if (hint) {
    const h = document.createElement("div");
    h.className = "search-hint";
    h.textContent = hint;
    wrap.appendChild(h);
  }
  bar.appendChild(wrap);
}

function clearFiltersBar() {
  const bar = $("#filters-bar");
  if (!bar) return;
  bar.innerHTML = "";
  delete bar.dataset.tab;
}

    <div class="desc">Logical network segments referenced by hosts and interfaces.</div>
    <div class="spacer"></div>
  `;

  root.appendChild(buildFilterRow([
    { id: "all", label: "All" },
    { id: "on",  label: "DHCP on" },
    { id: "off", label: "DHCP off" }
  ], vlanDhcpFilter, id => {
    vlanDhcpFilter = id;
    render();
  }));

  const ids = sortedVlanIds();
  const filtered = ids.filter(id => {

    const dhcpChip = v.dhcp
      ? `<span class="chip success">DHCP on</span>`
      : `<span class="chip outline">DHCP off</span>`;
    const range = v.dhcp && (v.dhcp_range_start || v.dhcp_range_end)

function matchVlan(id) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  const v = state.vlans[id];
  return id.toLowerCase().includes(q)
      || (v.name || "").toLowerCase().includes(q)
      || (v.tag != null && String(v.tag).includes(q))
      || formatVlanGateway(v).toLowerCase().includes(q)
      || (v.dhcp_range_start || "").toLowerCase().includes(q)
      || (v.dhcp_range_end || "").toLowerCase().includes(q);
}

function countVlanUsage(vlanId) {
  let n = 0;
  for (const ep of Object.values(state.hosts)) {
    if (ep.management_vlan === vlanId) n++;
    for (const i of ep.interfaces) {
      if (i.access_vlan === vlanId) n++;
      if ((i.allowed_vlans || []).includes(vlanId)) n++;
    }
  }
  return n;
}

function openVlanForm(id = null) {
  const isEdit = !!id;
  const v = isEdit ? clone(state.vlans[id]) : { name: "", tag: null, gateway_ip: "", subnet_prefix: null, dhcp: true, dhcp_range_start: "", dhcp_range_end: "" };
  const initialId = id || "";

  const body = document.createElement("div");

  const tagFieldHtml = `<input id="vlan_tag" type="number" min="1" max="4094" value="${escapeHtml(v.tag != null ? v.tag : "")}" placeholder="e.g. 10" required>`;
  if (isEdit) {
    const idTagRow = document.createElement("div");
    idTagRow.className = "row r-2";
    idTagRow.appendChild(field({
      label: "VLAN ID",
      id: "vlan_id",
      html: `<input id="vlan_id" type="text" value="${escapeHtml(initialId)}" readonly>`,
      help: "Auto-generated, readonly."
    }));
    idTagRow.appendChild(field({
      label: "Tag",
      id: "vlan_tag",
      html: tagFieldHtml,
      help: "802.1Q VLAN tag (1–4094)."
    }));
    body.appendChild(idTagRow);
  } else {
    body.appendChild(field({
      label: "Tag",
      id: "vlan_tag",
      html: tagFieldHtml,
      help: "802.1Q VLAN tag (1–4094). ID is auto-generated on save."
    }));
  }
  body.appendChild(field({
    label: "Name",
    id: "vlan_name",
    html: `<input id="vlan_name" type="text" value="${escapeHtml(v.name)}" placeholder="e.g. LAN, GUEST, IOT" required>`,
    help: "Human-readable label for this segment."
  }));
  body.appendChild(field({
    label: "Gateway (CIDR)",
    id: "vlan_gw",
    html: `<input id="vlan_gw" type="text" value="${escapeHtml(formatVlanGateway(v))}" placeholder="192.168.10.1/24">`,
    help: "Optional. Gateway IP plus subnet mask in CIDR notation. Stored as separate gateway_ip and subnet_prefix fields."
  }));

  const dhcpWrap = document.createElement("div");
  dhcpWrap.className = "field";
  dhcpWrap.innerHTML = `
    <label>DHCP</label>
    <div class="checkbox-row">
      <input type="checkbox" id="vlan_dhcp" ${v.dhcp ? "checked" : ""}>
      <label for="vlan_dhcp" style="font-weight:500; color:var(--text); font-size:14px;">DHCP server enabled on this VLAN</label>
    </div>
  `;
  body.appendChild(dhcpWrap);

  const rangeWrap = document.createElement("div");
  rangeWrap.className = "field";
  rangeWrap.innerHTML = `
    <label>DHCP range</label>
    <div style="display:grid; grid-template-columns:1fr auto 1fr; gap:var(--space-2); align-items:center;">
      <input id="vlan_dhcp_start" type="text" value="${escapeHtml(v.dhcp_range_start || "")}" placeholder="192.168.10.100">
      <span class="muted" style="font-size:13px;">to</span>
      <input id="vlan_dhcp_end" type="text" value="${escapeHtml(v.dhcp_range_end || "")}" placeholder="192.168.10.200">
    </div>
    <div class="help">Optional. Inclusive first and last addresses of the DHCP pool.</div>
  `;
  rangeWrap.style.display = v.dhcp ? "" : "none";
  body.appendChild(rangeWrap);

  $("#vlan_dhcp", body).addEventListener("change", e => {
    rangeWrap.style.display = e.target.checked ? "" : "none";
  });

  openModal({
    title: isEdit ? `Edit ${id}` : "New VLAN",
    sub: "Logical network segment",
    body,
    saveLabel: isEdit ? "Save changes" : "Create VLAN",
    onSave: () => {
      const name  = $("#vlan_name", body).value.trim();
      const tagRaw = $("#vlan_tag", body).value.trim();
      const gw    = $("#vlan_gw", body).value.trim();
      const dhcp  = $("#vlan_dhcp", body).checked;
      const rangeStart = dhcp ? $("#vlan_dhcp_start", body).value.trim() : "";
      const rangeEnd   = dhcp ? $("#vlan_dhcp_end", body).value.trim()   : "";

      if (!name)  { toast("Name is required", "error"); return false; }
      if (!tagRaw || !/^\d+$/.test(tagRaw)) { toast("Tag is required and must be an integer 1–4094", "error"); return false; }
      const tag = parseInt(tagRaw, 10);
      if (tag < 1 || tag > 4094) { toast("Tag must be in range 1–4094", "error"); return false; }
      let gateway_ip = "", subnet_prefix = null;
      if (gw) {
        const parsed = parseCidr(gw);
        if (!parsed) { toast("Gateway must be in CIDR notation (e.g. 192.168.1.1/24)", "error"); return false; }
        gateway_ip = parsed.address;
        subnet_prefix = parsed.prefix;
      }
      if (rangeStart && !isValidIp(rangeStart)) { toast("DHCP range start is not a valid IPv4 address", "error"); return false; }
      if (rangeEnd   && !isValidIp(rangeEnd))   { toast("DHCP range end is not a valid IPv4 address", "error"); return false; }
      if ((rangeStart && !rangeEnd) || (!rangeStart && rangeEnd)) { toast("DHCP range needs both start and end addresses", "error"); return false; }

      const newId = isEdit ? id : randomId("v", state.vlans);
      state.vlans[newId] = { name, tag, gateway_ip, subnet_prefix, dhcp, dhcp_range_start: rangeStart, dhcp_range_end: rangeEnd };
      saveState();
      render();
      toast(isEdit ? "VLAN updated" : "VLAN created", "success");
    },
    onDelete: isEdit ? () => deleteVlan(id) : null
  });
}

function deleteVlan(id) {
  const usage = countVlanUsage(id);
  const msg = usage > 0
    ? `This VLAN is referenced by ${usage} item(s) (host management, access ports, or trunk allow-lists). Deleting will leave dangling references that you'll need to clean up by hand.`
    : `Delete VLAN '${id}'? This cannot be undone.`;
  confirmDelete({
    title: `Delete ${id}`,
    message: msg,
    onConfirm: () => {
      delete state.vlans[id];
      saveState();
      render();
      toast("VLAN deleted");
    }
  });
}

function matchHost(id) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  const ep = state.hosts[id];
  if (id.toLowerCase().includes(q)) return true;
  if ((ep.display_name || "").toLowerCase().includes(q)) return true;
  if ((ep.hostname || "").toLowerCase().includes(q)) return true;
  if ((ep.role || "").toLowerCase().includes(q)) return true;
  if ((ep.kind || "").toLowerCase().includes(q)) return true;
  if ((ep.software?.name || "").toLowerCase().includes(q)) return true;
  if ((ep.software?.version || "").toLowerCase().includes(q)) return true;
  if ((ep.software?.edition || "").toLowerCase().includes(q)) return true;
  if ((ep.software?.kernel || "").toLowerCase().includes(q)) return true;
  if ((ep.software?.notes || "").toLowerCase().includes(q)) return true;
  if ((ep.manufacturer || "").toLowerCase().includes(q)) return true;
  if ((ep.model || "").toLowerCase().includes(q)) return true;
  if ((ep.hardware_revision || "").toLowerCase().includes(q)) return true;
  if ((ep.vm_id || "").toLowerCase().includes(q)) return true;
  if ((ep.management_ip || "").toLowerCase().includes(q)) return true;
  if ((ep.management_vlan || "").toLowerCase().includes(q)) return true;
  if ((ep.aliases || []).some(a => (a || "").toLowerCase().includes(q))) return true;
  if ((ep.identifiers || []).some(it => (it?.value || "").toLowerCase().includes(q) || (it?.label || "").toLowerCase().includes(q) || (it?.kind || "").toLowerCase().includes(q))) return true;
  for (const i of ep.interfaces) {
    if ((i.name || "").toLowerCase().includes(q)) return true;
    if ((i.parent || "").toLowerCase().includes(q)) return true;
    if ((i.mac || "").toLowerCase().includes(q)) return true;
    if ((i.access_vlan || "").toLowerCase().includes(q)) return true;
    if ((i.native_vlan || "").toLowerCase().includes(q)) return true;
    if ((i.allowed_vlans || []).some(v => v.toLowerCase().includes(q))) return true;
    if ((i.ip_addresses || []).some(ip => formatCidr(ip).toLowerCase().includes(q))) return true;
    if (connectedToMatches(i.connected_to, q)) return true;
  }
  for (const s of ep.services) {
    if ((s.name || "").toLowerCase().includes(q)) return true;
    if ((s.display_name || "").toLowerCase().includes(q)) return true;
    if ((s.category || "").toLowerCase().includes(q)) return true;
    if ((s.protocol || "").toLowerCase().includes(q)) return true;
    if (String(s.port || "").includes(q)) return true;
    if ((s.listen_ip || "").toLowerCase().includes(q)) return true;
  }
  for (const l of (ep.links || [])) {
    if ((l.label || "").toLowerCase().includes(q)) return true;
    if ((l.url || "").toLowerCase().includes(q)) return true;
  }
  for (const p of (ep.peripherals || [])) {
    if ((p.slot || "").toLowerCase().includes(q)) return true;
    if ((p.usb_vid_pid || "").toLowerCase().includes(q)) return true;
    if ((p.description || "").toLowerCase().includes(q)) return true;
    if ((p.kind || "").toLowerCase().includes(q)) return true;
  }
  return false;
}

function orderedInterfaces(interfaces) {
  const names = new Set(interfaces.map(i => i.name));
  const childrenByParent = new Map();
  const tops = [];
  interfaces.forEach((iface, idx) => {
    const entry = { iface, idx, parentName: "", isChild: false };
    const p = iface.parent || "";
    if (p && names.has(p) && p !== iface.name) {
      entry.parentName = p;
      entry.isChild = true;
      if (!childrenByParent.has(p)) childrenByParent.set(p, []);
      childrenByParent.get(p).push(entry);
    } else {
      tops.push(entry);
    }
  });
  const out = [];
  function emit(entry) {
    out.push(entry);
    const kids = childrenByParent.get(entry.iface.name);
    if (kids) kids.forEach(emit);
  }
  tops.forEach(emit);
  return out;
}

function hostDetailCard(id) {
  const ep = state.hosts[id];
  const card = document.createElement("div");
  card.className = "host-card";
  card.dataset.hostId = id;
  const cred = ep.credential_ref && state.credentials[ep.credential_ref];

  const swLabel = formatSoftware(ep.software);
  const hwLabel = formatHardware(ep);

  const baseName = ep.display_name || ep.hostname || "(unnamed host)";
  const sub = ep.hostname && ep.hostname !== ep.display_name ? escapeHtml(ep.hostname) : "";

  const vlanInfo = ep.management_vlan ? state.vlans[ep.management_vlan] : null;
  const vlanLabel = ep.management_vlan
    ? (vlanInfo?.name ? `on ${escapeHtml(ep.management_vlan)} (${escapeHtml(vlanInfo.name)})` : `on ${escapeHtml(ep.management_vlan)}`)
    : "";

  const tagChips = [];
  if (ep.kind) tagChips.push(`<span class="chip accent">${escapeHtml(ep.kind)}</span>`);
  if (ep.role) tagChips.push(`<span class="chip indigo">${escapeHtml(ep.role)}</span>`);
  if (swLabel) tagChips.push(`<span class="chip outline">${escapeHtml(swLabel)}</span>`);
  if (hwLabel) tagChips.push(`<span class="chip">${escapeHtml(hwLabel)}</span>`);
  (ep.aliases || []).forEach(a => { if (a) tagChips.push(`<span class="chip">${escapeHtml(a)}</span>`); });
  (ep.identifiers || []).forEach(it => {
    if (it && it.value) tagChips.push(`<span class="chip outline">${escapeHtml(`${it.label || it.kind}: ${it.value}`)}</span>`);
  });

  const footParts = [];
  if (cred) footParts.push(`<span>cred <b>${escapeHtml(cred.username || "(no username)")}</b> ${credentialTypeChip(cred.type || "shell")}</span>`);
  if (ep.hosted_on) {
    const parent = state.hosts[ep.hosted_on];
    const parentLabel = parent ? (parent.display_name || parent.hostname || ep.hosted_on) : ep.hosted_on;
    const vmBit = ep.vm_id ? ` (VMID ${escapeHtml(ep.vm_id)})` : "";
    footParts.push(`<span>hosted on <b>${escapeHtml(parentLabel)}</b>${vmBit}</span>`);
  } else if (ep.vm_id) {
    footParts.push(`<span>VMID <b>${escapeHtml(ep.vm_id)}</b></span>`);
  }
  if (ep.hardware_revision) footParts.push(`<span>rev <b>${escapeHtml(ep.hardware_revision)}</b></span>`);
  const foot = footParts
    .map((part, idx2) => idx2 === 0 ? part : `<span class="dot"></span>${part}`)
    .join("");

  const ifaceLines = ep.interfaces.length === 0
    ? `<div class="hc-empty">No interfaces.</div>`
    : orderedInterfaces(ep.interfaces).map(({ iface: i, idx, isChild, parentName }) => {
        const peerStr = isChild
          ? `on ${parentName}`
          : (formatConnectedTo(i.connected_to) ? `→ ${formatConnectedTo(i.connected_to)}` : "");
        const valBits = [];
        if (i.mode) valBits.push(escapeHtml(i.mode));
        if (i.mode === "access" && i.access_vlan) valBits.push(escapeHtml(i.access_vlan));
        if (i.mode === "trunk" && i.native_vlan) valBits.push(`native ${escapeHtml(i.native_vlan)}`);
        if (i.mode === "trunk" && i.allowed_vlans?.length) valBits.push(`allow ${escapeHtml(i.allowed_vlans.join(","))}`);
        if (peerStr) valBits.push(escapeHtml(peerStr));
        const val = valBits.join(" · ");
        const ips = (i.ip_addresses || []).map(formatCidr).filter(Boolean);
        const right = ips.length ? escapeHtml(ips.join(", ")) : "";
        return `
          <div class="hc-line">
            <span class="name${isChild ? " is-child" : ""}">${escapeHtml(i.name)}</span>
            <span class="val">${val}</span>
            <span class="right">${right}</span>
            <span class="row-actions">
              <button class="btn sm ghost" data-action="edit-iface" data-host-id="${escapeHtml(id)}" data-idx="${idx}">Edit</button>
              <button class="btn sm ghost" data-action="del-iface" data-host-id="${escapeHtml(id)}" data-idx="${idx}" aria-label="Delete">×</button>
            </span>
          </div>`;
      }).join("");

  const svcLines = ep.services.length === 0
    ? `<div class="hc-empty">No services.</div>`
    : ep.services.map((s, idx) => {
        const valBits = [];
        if (s.category) valBits.push(escapeHtml(s.category));
        if (s.url) valBits.push(escapeHtml(s.url));
        else if (s.listen_ip) valBits.push(`listen ${escapeHtml(s.listen_ip)}`);
        if (s.credential_ref && state.credentials[s.credential_ref]) valBits.push(`cred ${escapeHtml(s.credential_ref)}`);
        const val = valBits.join(" · ");
        const port = `${s.protocol || ""}${s.port ? ":" + s.port : ""}`;
        return `
          <div class="hc-line">
            <span class="name">${escapeHtml(s.display_name || s.name)}</span>
            <span class="val">${val}</span>
            <span class="right">${escapeHtml(port)}</span>
            <span class="row-actions">
              <button class="btn sm ghost" data-action="edit-svc" data-host-id="${escapeHtml(id)}" data-idx="${idx}">Edit</button>
              <button class="btn sm ghost" data-action="del-svc" data-host-id="${escapeHtml(id)}" data-idx="${idx}" aria-label="Delete">×</button>
            </span>
          </div>`;
      }).join("");

  const linksSection = (ep.links || []).length ? `
    <div class="hc-section">
      <h5>Links · ${ep.links.length}</h5>
      ${ep.links.map(l => `
        <div class="hc-line">
          <span class="name">${escapeHtml(l.label || l.url || "—")}</span>
          <span class="val">${l.url ? `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.url)}</a>` : ""}</span>
          <span class="right"></span>
          <span class="row-actions"></span>
        </div>
      `).join("")}
    </div>` : "";

  const periphSection = (ep.peripherals || []).length ? `
    <div class="hc-section">
      <h5>Peripherals · ${ep.peripherals.length}</h5>
      ${ep.peripherals.map(p => {
        const head = p.slot || p.usb_vid_pid || p.description || "—";
        const valBits = [];
        if (p.kind) valBits.push(escapeHtml(p.kind));
        if (p.kind === "usb" && p.usb_vid_pid && head !== p.usb_vid_pid) valBits.push(escapeHtml(p.usb_vid_pid));
        if (p.description && head !== p.description) valBits.push(escapeHtml(p.description));
        return `
          <div class="hc-line">
            <span class="name">${escapeHtml(head)}</span>
            <span class="val">${valBits.join(" · ")}</span>
            <span class="right"></span>
            <span class="row-actions"></span>
          </div>`;
      }).join("")}
    </div>` : "";

  card.innerHTML = `
    <div class="hc-top">
      <div class="hc-id-block">
        <div class="hc-name">${escapeHtml(baseName)}</div>
        <div class="hc-host-l">${sub}</div>
      </div>
      <div class="hc-mgmt">
        <div class="ip${ep.management_ip ? "" : " is-empty"}">${escapeHtml(ep.management_ip || "no mgmt IP")}</div>
        ${vlanLabel ? `<span class="vlan">${vlanLabel}</span>` : ""}
      </div>
      <div class="hc-actions">
        <button class="btn sm" data-action="edit-host" data-host-id="${escapeHtml(id)}">Edit</button>
      </div>
    </div>
    ${tagChips.length ? `<div class="hc-tags">${tagChips.join("")}</div>` : ""}
    ${foot ? `<div class="hc-foot">${foot}</div>` : ""}
    <div class="hc-section">
      <h5>Interfaces · ${ep.interfaces.length}
        <span class="add"><button class="btn sm ghost" data-action="add-iface" data-host-id="${escapeHtml(id)}">+ Add</button></span>
      </h5>
      ${ifaceLines}
    </div>
    <div class="hc-section">
      <h5>Services · ${ep.services.length}
        <span class="add"><button class="btn sm ghost" data-action="add-svc" data-host-id="${escapeHtml(id)}">+ Add</button></span>
      </h5>
      ${svcLines}
    </div>
    ${linksSection}
    ${periphSection}
  `;
  return card;
}

function deleteHost(id) {
  const ep = state.hosts[id];
  confirmDelete({
    title: `Delete ${ep.display_name || id}`,
    message: `This will remove the host, its ${ep.interfaces.length} interface(s) and ${ep.services.length} service(s). This cannot be undone.`,
    onConfirm: () => {
      delete state.hosts[id];

      for (const e of Object.values(state.hosts)) {
        if (e.hosted_on === id) e.hosted_on = "";
      }
      saveState();
      render();
      toast("Host deleted");
    }
  });
}

function pickHostThen(thingLabel, formOpener) {
  const hostIds = Object.keys(state.hosts);
  if (hostIds.length === 0) {
    toast(`Add a host first to attach a ${thingLabel}`, "error");
    return;
  }
  if (hostIds.length === 1) {
    formOpener(hostIds[0]);
    return;
  }
  const body = document.createElement("div");
  const opts = hostIds
    .slice()
    .sort((a, b) => (state.hosts[a].display_name || a).localeCompare(state.hosts[b].display_name || b))
    .map(id => ({ value: id, label: `${state.hosts[id].display_name || id}` + (state.hosts[id].display_name && state.hosts[id].display_name !== id ? ` · ${id}` : "") }));
  body.appendChild(field({
    label: "Host",
    id: "pick_host",
    html: `<select id="pick_host" required>${selectOptions(opts, opts[0].value, false)}</select>`,
    help: `Choose which host to add the ${thingLabel} to.`
  }));
  openModal({
    title: `Add ${thingLabel}`,
    sub: "Pick the host first",
    body,
    saveLabel: "Continue",
    onSave: () => {
      const hostId = $("#pick_host", body).value;
      setTimeout(() => formOpener(hostId), 0);
    }
  });
}

  body.appendChild(connSection);

  function refreshConnIfaceOptions(preferredName) {
    const hid = $("#if_conn_host", body).value;
    const sel = $("#if_conn_iface", body);
    const target = preferredName != null ? preferredName : sel.value;
    if (!hid || !state.hosts[hid]) {
      sel.innerHTML = `<option value="">—</option>`;
      sel.disabled = true;
      return;
    }
    sel.disabled = false;
    const ifaces = (state.hosts[hid].interfaces || []).map(it => it.name).filter(Boolean);
    const opts = [`<option value="">—</option>`];
    ifaces.forEach(n => {
      opts.push(`<option value="${escapeHtml(n)}"${n === target ? " selected" : ""}>${escapeHtml(n)}</option>`);
    });
    sel.innerHTML = opts.join("");
  }
  refreshConnIfaceOptions(conn.interface || "");
  $("#if_conn_host", body).addEventListener("change", () => refreshConnIfaceOptions(""));

  const parentOpts = ep.interfaces
    .map((other, otherIdx) => ({ other, otherIdx }))
    .filter(({ otherIdx }) => !isEdit || otherIdx !== idx)
    .map(({ other }) => ({ value: other.name, label: `${other.name}${other.type ? ` · ${other.type}` : ""}${other.mode ? ` · ${other.mode}` : ""}` }));
  body.appendChild(field({
    label: "Parent interface",
    id: "if_parent",
    html: `<select id="if_parent">${selectOptions(parentOpts, i.parent || "", true, "— top-level (none)")}</select>`,
    help: "Optional. Set this when the interface is a virtual partition of another interface on this host (VLAN sub-interface, bridge member, virtual NIC riding on a physical port)."
  }));

  const vlanWrap = document.createElement("div");
  body.appendChild(vlanWrap);

  function renderVlanArea() {
    vlanWrap.innerHTML = "";
    const mode = $("#if_mode", body).value;
    if (mode === "access") {
      vlanWrap.appendChild(field({
        label: "Access VLAN",
        id: "if_avlan",
        html: `<select id="if_avlan">${selectOptions(sortedVlanIds().map(v => ({ value: v, label: vlanLabel(v) })), i.access_vlan)}</select>`
      }));
    } else {
      const f = document.createElement("div");
      f.className = "field";
      f.innerHTML = `<label>Allowed VLANs</label>`;
      f.appendChild(buildVlanMultiSelect("if_avlans", new Set(i.allowed_vlans || [])));
      vlanWrap.appendChild(f);
      vlanWrap.appendChild(field({
        label: "Native VLAN (PVID)",
        id: "if_nvlan",
        html: `<select id="if_nvlan">${selectOptions(sortedVlanIds().map(v => ({ value: v, label: vlanLabel(v) })), i.native_vlan, true, "— none —")}</select>`,
        help: "Optional. Untagged VLAN on this trunk. Leave empty if untagged frames aren't carried."
      }));
    }
  }
  renderVlanArea();
  body.querySelector("#if_mode").addEventListener("change", renderVlanArea);

  const ipField = document.createElement("div");
  ipField.className = "field";
  ipField.innerHTML = `<label>IP addresses</label>`;
  const ipRep = buildRepeater({ name: "IP", values: (i.ip_addresses || []).map(formatCidr), placeholder: "192.168.10.1/24" });
  ipField.appendChild(ipRep);
  body.appendChild(ipField);

  openModal({
    title: isEdit ? `Edit interface · ${i.name || ""}` : `Add interface to ${ep.display_name || epId}`,
    sub: "Network interface, port, or virtual NIC",
    body,
    saveLabel: isEdit ? "Save changes" : "Add interface",
    onSave: () => {
      const name = $("#if_name", body).value.trim();
      const type = $("#if_type", body).value;
      const mode = $("#if_mode", body).value;
      const ips  = ipRep.collectValues();

      const parent = $("#if_parent", body).value;

      if (!name) { toast("Interface name is required", "error"); return false; }
      if (parent && parent === name) { toast("An interface cannot be its own parent", "error"); return false; }
      const ipObjs = [];
      for (const ip of ips) {
        if (!ip) continue;
        const cidr = parseCidr(ip);
        if (cidr) { ipObjs.push(cidr); continue; }
        if (isValidIp(ip)) { ipObjs.push({ address: ip.trim(), prefix: null }); continue; }
        toast(`'${ip}' is not a valid IP/CIDR`, "error");
        return false;
      }

      const connHost = $("#if_conn_host", body).value;
      const connIface = $("#if_conn_iface", body).value;
      const connBridge = $("#if_conn_bridge", body).value.trim();
      const connTagRaw = $("#if_conn_tag", body).value.trim();
      let connTag = null;
      if (connTagRaw !== "") {
        if (!/^\d+$/.test(connTagRaw)) { toast("Via tag must be an integer 1–4094", "error"); return false; }
        const n = parseInt(connTagRaw, 10);
        if (n < 1 || n > 4094) { toast("Via tag must be in range 1–4094", "error"); return false; }
        connTag = n;
      }

      const mac = $("#if_mac", body).value.trim();
      const result = {
        name, type, mode, mac, parent,
        connected_to: { host_id: connHost, interface: connIface, via_bridge: connBridge, via_tag: connTag },
        access_vlan: "",
        native_vlan: "",
        allowed_vlans: [],
        ip_addresses: ipObjs
      };
      if (mode === "access") {
        result.access_vlan = $("#if_avlan", body).value;
      } else {
        result.allowed_vlans = Array.from(body.querySelectorAll('input[name="if_avlans"]:checked')).map(x => x.value);
        const nvlanEl = $("#if_nvlan", body);
        if (nvlanEl) result.native_vlan = nvlanEl.value;
      }

      if (isEdit) {
        ep.interfaces[idx] = result;
      } else {
        ep.interfaces.push(result);
      }
      saveState();
      render();
      toast(isEdit ? "Interface updated" : "Interface added", "success");
    },
    onDelete: isEdit ? () => deleteInterface(epId, idx) : null
  });
}

    onConfirm: () => {
      ep.interfaces.splice(idx, 1);
      saveState();
      render();
      toast("Interface deleted");
    }
  });
}

    help: "Reuse a credential record. Leave blank if none."
  }));

    title: isEdit ? `Edit service · ${s.name || ""}` : `Add service to ${ep.display_name || epId}`,

    saveLabel: isEdit ? "Save changes" : "Add service",
    onSave: () => {
      const name  = $("#sv_name", body).value.trim();
      const dname = $("#sv_dname", body).value.trim();
      const proto = $("#sv_proto", body).value;
      const lip   = $("#sv_lip", body).value.trim();
      const portRaw = $("#sv_port", body).value.trim();
      const url   = $("#sv_url", body).value.trim();
      const cred  = $("#sv_cred", body).value;

      if (!name) { toast("Service name is required", "error"); return false; }
      if (lip && !isValidIp(lip)) { toast("Listen IP is not a valid IPv4 address", "error"); return false; }

      if (portRaw) {
        const p = +portRaw;
        if (!Number.isInteger(p) || p < 0 || p > 65535) { toast("Port must be 0–65535", "error"); return false; }
        port = p;
      }

      let useId;
      if (isEdit) {
        useId = ep.services[idx].id || initialId;

        ep.services.forEach(svc => { if (svc.id) used[svc.id] = true; });

        id: useId,
        name, display_name: dname, category: cat, protocol: proto,
        listen_ip: lip, port, url, credential_ref: cred

      saveState();
      render();

    onDelete: isEdit ? () => deleteService(epId, idx) : null
  });
