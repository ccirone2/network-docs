function renderInterfaces(root) {
  const sh = document.createElement("div");
  sh.className = "section-header";
  sh.innerHTML = `
    <h2>Interfaces</h2>
    <div class="desc">Every interface on every host, in one list.</div>
    <div class="spacer"></div>
  `;
  root.appendChild(sh);

  buildSearchRow({
    placeholder: "Search interface name, VLAN, IP, host…",
    addBtn: { label: "Add interface", onClick: () => pickHostThen("interface", openInterfaceForm) }
  });

  root.appendChild(buildFilterRow([
    { id: "all",      label: "All" },
    { id: "access",   label: "Access" },
    { id: "trunk",    label: "Trunk" },
    { id: "untagged", label: "Untagged" }
  ], interfaceModeFilter, id => {
    interfaceModeFilter = id;
    render();
  }));

  const items = [];
  for (const [epId, ep] of Object.entries(state.hosts)) {
    ep.interfaces.forEach((i, idx) => items.push({ epId, ep, i, idx }));
  }
  const filtered = items.filter(({ epId, ep, i }) => {
    if (interfaceModeFilter !== "all" && (i.mode || "") !== interfaceModeFilter) return false;
    if (!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return (i.name || "").toLowerCase().includes(q)
        || (i.parent || "").toLowerCase().includes(q)
        || (i.mac || "").toLowerCase().includes(q)
        || (i.access_vlan || "").toLowerCase().includes(q)
        || (i.native_vlan || "").toLowerCase().includes(q)
        || connectedToMatches(i.connected_to, q)
        || (ep.display_name || "").toLowerCase().includes(q)
        || (ep.hostname || "").toLowerCase().includes(q)
        || epId.toLowerCase().includes(q)
        || (i.allowed_vlans || []).some(v => v.toLowerCase().includes(q))
        || (i.ip_addresses || []).some(ip => formatCidr(ip).toLowerCase().includes(q));
  });

  if (filtered.length === 0) {
    const noHosts = Object.keys(state.hosts).length === 0;
    root.appendChild(emptyState({
      title: items.length === 0 ? "No interfaces yet" : "No matches",
      message: items.length === 0
        ? (noHosts
            ? "Add a host first, then attach its interfaces."
            : "Add interfaces from any host card or with the button above.")
        : "No interfaces match your search.",
      action: items.length === 0 && !noHosts ? { label: "+ Add interface", onClick: () => pickHostThen("interface", openInterfaceForm) } : undefined
    }));
    return;
  }

  const groups = new Map();
  filtered.forEach(item => {
    if (!groups.has(item.epId)) groups.set(item.epId, []);
    groups.get(item.epId).push(item);
  });

  const sortedHostIds = Array.from(groups.keys()).sort((a, b) => {
    const an = (state.hosts[a].display_name || a).toLowerCase();
    const bn = (state.hosts[b].display_name || b).toLowerCase();
    return an.localeCompare(bn);
  });

  sortedHostIds.forEach(epId => {
    const ep = state.hosts[epId];
    const group = document.createElement("div");
    group.className = "host-group";

    const header = document.createElement("div");
    header.className = "host-group-header";
    header.innerHTML = `
      <h3>${escapeHtml(ep.display_name || epId)}</h3>
      <span class="host-group-id">${escapeHtml(epId)}</span>
      <span class="spacer"></span>
      <button class="btn sm ghost" data-action="add-iface" data-host-id="${escapeHtml(epId)}">+ Add interface</button>
    `;
    group.appendChild(header);

    const grid = document.createElement("div");
    grid.className = "grid tiles";
    const visibleIdxs = new Set(groups.get(epId).map(g => g.idx));
    const ordered = orderedInterfaces(ep.interfaces).filter(o => visibleIdxs.has(o.idx));
    ordered.forEach(({ iface: i, idx, isChild, parentName }) => {
      const card = document.createElement("div");
      card.className = "iface-card" + (isChild ? " is-child" : "");
      const peer = isChild
        ? { arrow: "↳", text: `on ${parentName}` }
        : (formatConnectedTo(i.connected_to) ? { arrow: "→", text: formatConnectedTo(i.connected_to) } : null);
      const ips = (i.ip_addresses || []).map(formatCidr).filter(Boolean);
      const footParts = [];
      if (ips.length) footParts.push(`<span><b>${escapeHtml(ips.join(", "))}</b></span>`);
      if (i.mode === "access" && i.access_vlan) footParts.push(`<span><b>${escapeHtml(i.access_vlan)}</b></span>`);
      if (i.mode === "trunk" && i.native_vlan) footParts.push(`<span>native <b>${escapeHtml(i.native_vlan)}</b></span>`);
      if (i.mode === "trunk" && i.allowed_vlans?.length) footParts.push(`<span>allow <b>${escapeHtml(i.allowed_vlans.join(", "))}</b></span>`);
      if (i.mac) footParts.push(`<span>${escapeHtml(i.mac)}</span>`);
      const foot = footParts.join(`<span class="dot"></span>`);
      card.innerHTML = `
        <div class="ic-top">
          <span class="ic-name">${escapeHtml(i.name)}</span>
          ${i.mode ? `<span class="chip ${i.mode === "trunk" ? "indigo" : "accent"}">${escapeHtml(i.mode)}</span>` : ""}
          ${i.type ? `<span class="chip outline">${escapeHtml(i.type)}</span>` : ""}
          ${peer ? `<span class="ic-arrow">${peer.arrow}</span><span class="ic-peer">${escapeHtml(peer.text)}</span>` : ""}
          <div class="ic-actions">
            <button class="btn sm ghost" data-action="edit-iface" data-host-id="${escapeHtml(epId)}" data-idx="${idx}">Edit</button>
          </div>
        </div>
        ${foot ? `<div class="ic-foot">${foot}</div>` : ""}
      `;
      grid.appendChild(card);
    });
    group.appendChild(grid);
    root.appendChild(group);
  });
}

function renderCredentials(root) {
  const sh = document.createElement("div");
  sh.className = "section-header";
  sh.innerHTML = `
    <h2>Credentials</h2>
    <div class="desc">Sensitive — stored locally in this browser only.</div>
    <div class="spacer"></div>
  `;
  root.appendChild(sh);

  const notice = document.createElement("div");
  notice.className = "secret-warn";
  notice.innerHTML = `
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span>Treat values as sensitive. Storage is plain JSON in localStorage.</span>
  `;
  root.appendChild(notice);

  if (Crypto.isEncryptedSession()) {
    const banner = document.createElement("div");
    banner.className = "secret-warn";
    banner.style.color = "var(--text-muted)";
    banner.textContent = "This file is encrypted. New and changed passwords will be re-encrypted on save.";
    root.appendChild(banner);
  }

  buildSearchRow({
    placeholder: "Search credential ID, username, type, secret ref…",
    addBtn: { label: "Add credential", onClick: () => openCredentialForm() }
  });

  if (Crypto.isEncryptedSession()) {
    const bar = $("#filters-bar");
    const row = bar.querySelector(".search-row");
    if (row && !row.querySelector(".btn-unlock-all")) {
      const allBtn = document.createElement("button");
      allBtn.type = "button";
      allBtn.className = "btn ghost btn-unlock-all";
      allBtn.textContent = "Reveal all";
      allBtn.addEventListener("click", async () => {
        if (!Crypto.isUnlocked()) {
          await promptUnlockForReveal();
          if (!Crypto.isUnlocked()) return;
        }
        const ids = Object.keys(state.credentials);
        let failed = 0;
        for (const id of ids) {
          const c = state.credentials[id];
          if (!Crypto.isEncryptedBlob(c.password)) continue;
          try {
            await Crypto.decryptField(c.password, `${data.activeNetworkId}:${id}`);
            revealedCreds.add(id);
          } catch {
            failed++;
          }
        }
        render();
        if (failed) toast(`${failed} credential(s) failed to decrypt`, "error");
      });
      row.appendChild(allBtn);
    }
  }

  const ids = Object.keys(state.credentials).sort();
  const filtered = ids.filter(id => {
    if (!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    const c = state.credentials[id];
    return id.toLowerCase().includes(q)
        || (c.username || "").toLowerCase().includes(q)
        || (c.type || "").toLowerCase().includes(q)
        || (c.external_ref?.provider || "").toLowerCase().includes(q)
        || (c.external_ref?.id || "").toLowerCase().includes(q)
        || (c.notes || "").toLowerCase().includes(q);
  });

  if (filtered.length === 0) {
    if (ids.length === 0) {
      root.appendChild(emptyState({
        title: "No credentials yet",
        message: "Add credential records to associate with hosts and services.",
        action: { label: "+ Add credential", onClick: () => openCredentialForm() }
      }));
    } else {
      root.appendChild(emptyState({ title: "No matches", message: "No credentials match your search." }));
    }
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid cols-2";
  filtered.forEach(id => grid.appendChild(credentialCard(id)));
  root.appendChild(grid);
}

function credentialCard(id) {
  const c = state.credentials[id];
  const links = findCredentialLinks(id);
  const card = document.createElement("div");
  card.className = "cred-card";
  card.dataset.credId = id;
  const revealed = revealedCreds.has(id);
  const erProvider = c.external_ref?.provider || "";
  const erId = c.external_ref?.id || "";
  const erIdShown = erId ? (revealed ? erId : maskSecret(erId)) : "";
  const hasExternalRef = !!(erProvider || erId);
  const refShown = erProvider && erIdShown
    ? `${erProvider}: ${erIdShown}`
    : (erProvider || erIdShown);

  let secretRow = "";
  const stored = c.password;
  const isBlob = Crypto.isEncryptedBlob(stored);
  const hasPassword = isBlob ? true : !!stored;
  if (hasPassword) {
    const cached = isBlob ? Crypto.peek(`${data.activeNetworkId}:${id}`) : null;
    const passShown = revealed
      ? (isBlob ? (cached ?? "••••••••") : stored)
      : "••••••••";
    secretRow = `
      <div class="cc-secret">
        <em>password</em>
        <span class="val">${escapeHtml(passShown)}</span>
        <button class="btn sm ghost" data-action="reveal-credential" data-cred-id="${escapeHtml(id)}">${revealed ? "Hide" : "Show"}</button>
        <button class="btn sm ghost" data-action="copy-credential" data-cred-id="${escapeHtml(id)}">Copy</button>
      </div>`;
  } else if (hasExternalRef) {
    secretRow = `
      <div class="cc-secret">
        <em>ref</em>
        <span class="val">${escapeHtml(refShown)}</span>
        <button class="btn sm ghost" data-action="reveal-credential" data-cred-id="${escapeHtml(id)}">${revealed ? "Hide" : "Show"}</button>
      </div>`;
  }

  const footParts = [];
  if (links.hosts.length) footParts.push(`<span><b>${links.hosts.length}</b> host${links.hosts.length === 1 ? "" : "s"}</span>`);
  if (links.services.length) footParts.push(`<span><b>${links.services.length}</b> service${links.services.length === 1 ? "" : "s"}</span>`);
  if (footParts.length === 0) footParts.push(`<span class="faint">unused</span>`);
  const foot = footParts
    .map((part, idx) => idx === 0 ? part : `<span class="dot"></span>${part}`)
    .join("");

  card.innerHTML = `
    <div class="cc-top">
      <span class="cc-id${c.username ? "" : " is-empty"}">${escapeHtml(c.username || "(no username)")}</span>
      <div class="cc-actions">
        ${credentialTypeChip(c.type || "shell")}
        ${hasExternalRef ? `<span class="chip success">vault</span>` : ""}
        <button class="btn sm ghost" data-action="edit-credential" data-cred-id="${escapeHtml(id)}">Edit</button>
      </div>
    </div>
    ${secretRow}
    ${c.notes ? `<div class="cc-notes">${escapeHtml(c.notes)}</div>` : ""}
    <div class="cc-foot">${foot}</div>
  `;
  return card;
}

function maskSecret(s) {
  if (!s) return "";
  if (s.length <= 6) return "•".repeat(s.length);
  return s.slice(0, 4) + "•".repeat(Math.max(4, s.length - 8)) + s.slice(-2);
}

function findCredentialLinks(credId) {
  const hosts = [];
  const services = [];
  for (const [hid, ep] of Object.entries(state.hosts)) {
    if (ep.credential_ref === credId) hosts.push(hid);
    for (const s of ep.services) {
      if (s.credential_ref === credId) services.push({ hostId: hid, id: s.id, name: s.name });
    }
  }
  return { hosts, services, count: hosts.length + services.length };
}

async function openCredentialForm(id = null) {
  const isEdit = !!id;
  const c = isEdit ? clone(state.credentials[id]) : { type: "shell", username: "", password: "", external_ref: { provider: "", id: "" }, notes: "" };
  if (isEdit && Crypto.isEncryptedBlob(c.password)) {
    if (!Crypto.isUnlocked()) {
      await promptUnlockForReveal();
      if (!Crypto.isUnlocked()) return;
    }
    const cacheKey = `${data.activeNetworkId}:${id}`;
    const cached = Crypto.peek(cacheKey);
    if (cached !== undefined) {
      c.password = cached;
    } else {
      try {
        c.password = await Crypto.decryptField(c.password, cacheKey);
      } catch {
        toast("Decryption failed", "error");
        return;
      }
    }
  }
  if (!c.external_ref || typeof c.external_ref !== "object") c.external_ref = { provider: "", id: "" };
  const initialId = id || "";
  const existingLinks = isEdit ? findCredentialLinks(id) : { hosts: [], services: [] };

  const body = document.createElement("div");
  if (isEdit) {
    body.appendChild(field({
      label: "Credential ID",
      id: "cr_id",
      html: `<input id="cr_id" type="text" value="${escapeHtml(initialId)}" readonly>`,
      help: "Auto-generated, readonly."
    }));
  }
  const row1 = document.createElement("div");
  row1.className = "row r-2";
  row1.appendChild(field({
    label: "Type",
    id: "cr_type",
    html: `<select id="cr_type">${selectOptions(CREDENTIAL_TYPES, c.type || "shell", false)}</select>`,
    help: "Where this credential is used (shell/SSH, web UI, API, console, etc.)."
  }));
  row1.appendChild(field({
    label: "Username",
    id: "cr_user",
    html: `<input id="cr_user" type="text" value="${escapeHtml(c.username)}" placeholder="admin" required>`
  }));
  body.appendChild(row1);
  body.appendChild(field({
    label: "Password",
    id: "cr_pass",
    html: `<input id="cr_pass" type="password" value="${escapeHtml(c.password)}" autocomplete="off">`,
    help: "Optional. Stored locally — treat with care."
  }));
  const refRow = document.createElement("div");
  refRow.className = "row r-2";
  refRow.appendChild(field({
    label: "Vault",
    id: "cr_ref_provider",
    html: `<input id="cr_ref_provider" type="text" value="${escapeHtml(c.external_ref.provider || "")}" placeholder="Bitwarden">`,
    help: "Password manager / vault name."
  }));
  refRow.appendChild(field({
    label: "Secret ID",
    id: "cr_ref_id",
    html: `<input id="cr_ref_id" type="text" value="${escapeHtml(c.external_ref.id || "")}" placeholder="password_id_07">`,
    help: "Provider-scoped identifier (item id, vault path)."
  }));
  body.appendChild(refRow);
  body.appendChild(field({
    label: "Notes",
    id: "cr_notes",
    html: `<textarea id="cr_notes" rows="3" placeholder="Where used, rotation policy, etc.">${escapeHtml(c.notes || "")}</textarea>`
  }));

  const hostItems = Object.keys(state.hosts).sort().map(hid => ({
    value: hid,
    label: state.hosts[hid].display_name ? `${hid} · ${state.hosts[hid].display_name}` : hid
  }));
  const svcItems = [];
  Object.keys(state.hosts).sort().forEach(hid => {
    state.hosts[hid].services.forEach(s => {
      if (!s.id) return;
      const key = `${hid}:${s.id}`;
      const display = s.display_name || s.name || s.id;
      const label = display && display !== s.id ? `${key} · ${display}` : key;
      svcItems.push({ value: key, label });
    });
  });

  const hostField = document.createElement("div");
  hostField.className = "field";
  hostField.innerHTML = `<label>Linked hosts</label><div class="help">Hosts whose management <code>credential_ref</code> points at this credential.</div>`;
  hostField.appendChild(buildLinkMultiSelect("cr_link_host", hostItems, new Set(existingLinks.hosts), "No hosts defined yet."));
  body.appendChild(hostField);

  const svcField = document.createElement("div");
  svcField.className = "field";
  svcField.innerHTML = `<label>Linked services</label><div class="help">Services (per host) whose <code>credential_ref</code> points at this credential.</div>`;
  svcField.appendChild(buildLinkMultiSelect(
    "cr_link_svc",
    svcItems,
    new Set(existingLinks.services.map(s => `${s.hostId}:${s.id}`)),
    "No services defined yet."
  ));
  body.appendChild(svcField);

  openModal({
    title: isEdit ? `Edit ${id}` : "New credential",
    sub: "Sensitive — stored in this browser only",
    body,
    saveLabel: isEdit ? "Save changes" : "Create credential",
    onSave: async () => {
      const type = $("#cr_type", body).value;
      const user = $("#cr_user", body).value.trim();
      const pass = $("#cr_pass", body).value;
      const refProvider = $("#cr_ref_provider", body).value.trim();
      const refId = $("#cr_ref_id", body).value.trim();
      const notes = $("#cr_notes", body).value.trim();
      if (!user) { toast("Username is required", "error"); return false; }

      const useId = isEdit ? id : randomId("c", state.credentials);

      let storedPassword;
      if (Crypto.isEncryptedSession()) {
        if (!Crypto.isUnlocked()) {
          await promptUnlockForReveal();
          if (!Crypto.isUnlocked()) return false;
        }
        try {
          storedPassword = pass === "" ? "" : await Crypto.encryptField(pass);
        } catch {
          toast("Encryption failed", "error");
          return false;
        }
      } else {
        storedPassword = pass;
      }
      state.credentials[useId] = {
        type, username: user,
        password: storedPassword,
        external_ref: { provider: refProvider, id: refId },
        notes
      };
      if (Crypto.isEncryptedSession() && pass !== "") {
        Crypto.setCache(`${data.activeNetworkId}:${useId}`, pass);
      }
      for (const [cid, cred] of Object.entries(state.credentials)) {
        const p = cred.password;
        if (typeof p !== "string" && !Crypto.isEncryptedBlob(p)) {
          console.error(`malformed password shape on credential ${cid}`);
          return false;
        }
      }

      const linkedHosts = new Set(
        Array.from(body.querySelectorAll('input[name="cr_link_host"]:checked')).map(i => i.value)
      );
      const linkedSvcs = new Set(
        Array.from(body.querySelectorAll('input[name="cr_link_svc"]:checked')).map(i => i.value)
      );
      for (const [hid, ep] of Object.entries(state.hosts)) {
        if (linkedHosts.has(hid)) ep.credential_ref = useId;
        else if (ep.credential_ref === useId) ep.credential_ref = "";
        for (const s of ep.services) {
          if (!s.id) continue;
          const key = `${hid}:${s.id}`;
          if (linkedSvcs.has(key)) s.credential_ref = useId;
          else if (s.credential_ref === useId) s.credential_ref = "";
        }
      }

      saveState();
      render();
      toast(isEdit ? "Credential updated" : "Credential created", "success");
    },
    onDelete: isEdit ? () => deleteCredential(id) : null
  });
}

function deleteCredential(id) {
  const usage = findCredentialLinks(id).count;
  const msg = usage > 0
    ? `This credential is used in ${usage} place(s). Deleting will leave dangling references on hosts and services.`
    : `Delete credential '${id}'? This cannot be undone.`;
  confirmDelete({
    title: `Delete ${id}`,
    message: msg,
    onConfirm: () => {
      delete state.credentials[id];
      revealedCreds.delete(id);
      saveState();
      render();
      toast("Credential deleted");
    }
  });
}

function mapLayerLabel(layer) {
  return ({ networks: "Networks", devices: "Devices", hosts: "Hosts", services: "Services" })[layer] || layer;
}
function setMapLayer(layer) {
  if (!MAP_LAYERS.includes(layer) || layer === activeLayer) return;
  activeLayer = layer;
  expandedNodeIds = new Set();
  focusedNodeId = null;
  saveViz();
  render();
}
function toggleMapNode(id) {
  if (expandedNodeIds.has(id)) expandedNodeIds.delete(id);
  else expandedNodeIds.add(id);
  render();
}
function jumpToLayer(layer, focusId, expandIds) {
  jumpStack = { layer: activeLayer, focus: focusedNodeId };
  activeLayer = layer;
  focusedNodeId = focusId || null;
  expandedNodeIds = new Set(expandIds || []);
  pendingFocusScroll = focusedNodeId || (expandIds && expandIds[0]) || null;
  saveViz();
  render();
}
function categoryClassName(cat) {
  return cat === "management" ? "warning"
       : cat === "infrastructure" ? "indigo"
       : cat === "other" ? "outline"
       : "accent";
}

function renderMap(root) {
  const sh = document.createElement("div");
  sh.className = "section-header";
  sh.innerHTML = `
    <h2>Map</h2>
    <div class="desc">Visualize networks, devices, hosts, and services across four layers.</div>
    <div class="spacer"></div>
  `;
  root.appendChild(sh);

  if (jumpStack) {
    const back = document.createElement("button");
    back.type = "button";
    back.className = "map-back-pill";
    back.innerHTML = `← Back to ${escapeHtml(mapLayerLabel(jumpStack.layer))}`;
    back.addEventListener("click", () => {
      const target = jumpStack;
      jumpStack = null;
      activeLayer = target.layer;
      focusedNodeId = target.focus;
      expandedNodeIds = target.focus ? new Set([target.focus]) : new Set();
      pendingFocusScroll = target.focus;
      saveViz();
      render();
    });
    root.appendChild(back);
  }

  const picker = buildFilterRow(
    MAP_LAYERS.map(l => ({ id: l, label: mapLayerLabel(l) })),
    activeLayer,
    setMapLayer
  );
  picker.classList.add("map-layer-picker");
  root.appendChild(picker);

  buildSearchRow({ placeholder: "Search the map" });

  switch (activeLayer) {
    case "networks": renderMapNetworks(root); break;
    case "devices":  renderMapDevices(root);  break;
    case "hosts":    renderMapHosts(root);    break;
    case "services": renderMapServices(root); break;
  }

  if (pendingFocusScroll) {
    pendingFocusScroll = null;
    requestAnimationFrame(() => {
      const focused = root.querySelector(".is-focused");
      if (focused && focused.scrollIntoView) focused.scrollIntoView({ block: "center", behavior: "smooth" });
    });
  }
}

function renderMapNetworks(root) {

  const visible = ids.filter(matchVlan);
  if (visible.length === 0) {
    root.appendChild(emptyState({
      title: ids.length === 0 ? "No VLANs yet" : "No matches",

    }));
    return;
  }
  const tree = document.createElement("div");
  tree.className = "map-tree";
  visible.forEach(id => {
    const v = state.vlans[id];
    const isExpanded = expandedNodeIds.has(id);
    const isFocused = focusedNodeId === id;
    const memberHosts = Object.keys(state.hosts).filter(hid => state.hosts[hid].management_vlan === id).sort();
    const gw = formatVlanGateway(v);
    const row = document.createElement("div");
    row.className = "map-row hybrid" + (isFocused ? " is-focused" : "");
    row.innerHTML = `
      <div class="map-row-head">
        <div class="map-title-block">
          <button class="map-title" type="button" data-action="edit-vlan" data-vlan-id="${escapeHtml(id)}">
            <strong>${escapeHtml(v.name || "(unnamed VLAN)")}</strong>
            ${v.tag != null ? `<span class="map-tag">tag ${escapeHtml(String(v.tag))}</span>` : ""}
          </button>
          ${gw ? `<div class="map-subline">${escapeHtml(gw)}</div>` : `<div class="map-subline muted">no gateway</div>`}
        </div>
        <div class="map-meta">
          ${v.dhcp ? `<span class="chip success">DHCP</span>` : `<span class="chip outline">no DHCP</span>`}
          <span class="chip">${memberHosts.length}</span>
          <button class="map-toggle" type="button" data-action="map-toggle" data-node-id="${escapeHtml(id)}" aria-expanded="${isExpanded}" aria-label="${isExpanded ? "Collapse" : "Expand"}">${isExpanded ? "−" : "+"}</button>
        </div>
      </div>
      ${isExpanded ? `
        <div class="map-row-body">
          ${memberHosts.length ? `
            <div class="map-pop-grid">
              ${memberHosts.map(hid => {
                const ep = state.hosts[hid];
                return `<div class="pop-item">
                  <span>${escapeHtml(ep.display_name || hid)}</span>
                  ${ep.management_ip ? `<span class="ip">${escapeHtml(ep.management_ip)}</span>` : ""}
                </div>`;
              }).join("")}
            </div>
            <div class="map-jump-row">
              <button class="map-jump-link" type="button" data-action="map-jump-hosts-vlan" data-vlan-id="${escapeHtml(id)}">View hosts in this VLAN →</button>
            </div>
          ` : `<div class="map-pop-empty">No hosts use this VLAN as their management VLAN.</div>`}
        </div>
      ` : ""}
    `;
    tree.appendChild(row);
  });
  root.appendChild(tree);
}

function renderMapDevices(root) {
  const physicalIds = Object.keys(state.hosts).filter(id => state.hosts[id].kind === "physical").sort();
  if (physicalIds.length === 0) {
    root.appendChild(emptyState({
      title: "No physical hosts",
      message: "Add at least one host with kind 'physical' to see the wiring backbone."
    }));
    return;
  }

  const adj = new Map();
  physicalIds.forEach(id => adj.set(id, []));
  physicalIds.forEach(id => {
    const ep = state.hosts[id];
    (ep.interfaces || []).forEach(iface => {
      const ct = iface.connected_to;
      const tHost = ct?.host_id || "";
      if (!tHost || !adj.has(tHost) || tHost === id) return;
      adj.get(id).push({ neighbor: tHost, localIface: iface.name, remoteIface: ct.interface || "" });
    });
  });

  const byDegree = physicalIds.slice().sort((a, b) => {
    const d = adj.get(b).length - adj.get(a).length;
    return d !== 0 ? d : (a < b ? -1 : 1);
  });
  const mainOrder = [];
  const visited = new Set();
  if (byDegree.length) {
    const q = [byDegree[0]];
    visited.add(byDegree[0]);
    while (q.length) {
      const cur = q.shift();
      mainOrder.push(cur);
      const neighbors = Array.from(new Set(adj.get(cur).map(e => e.neighbor))).sort();
      for (const n of neighbors) {
        if (!visited.has(n)) { visited.add(n); q.push(n); }
      }
    }
  }
  const floating = physicalIds.filter(id => !visited.has(id)).sort();

  const wrap = document.createElement("div");
  wrap.className = "map-svg-wrap";

  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("class", "map-svg");
  svg.setAttribute("width", "100%");
  wrap.appendChild(svg);

  function buildCard(id) {
    const ep = state.hosts[id];
    const isExpanded = expandedNodeIds.has(id);
    const isFocused = focusedNodeId === id;
    const dimmed = !matchHost(id);
    const ports = ep.interfaces || [];
    const el = document.createElement("div");
    el.className = "map-row map-device-card"
      + (isFocused ? " is-focused" : "")
      + (dimmed ? " is-dimmed" : "");
    el.innerHTML = `
      <div class="map-row-head">
        <button class="map-title" type="button" data-action="edit-host" data-host-id="${escapeHtml(id)}">
          <strong>${escapeHtml(ep.display_name || id)}</strong>
          <span class="card-sub">${escapeHtml(id)}${ep.management_ip ? " · " + escapeHtml(ep.management_ip) : ""}</span>
        </button>
        <div class="chips" style="margin-left:auto;">
          <span class="chip indigo">${escapeHtml(ep.role || "")}</span>
        </div>
        <button class="map-toggle" type="button" data-action="map-toggle" data-node-id="${escapeHtml(id)}" aria-expanded="${isExpanded}" aria-label="${isExpanded ? "Collapse" : "Expand"}">${isExpanded ? "−" : "+"}</button>
      </div>
      ${isExpanded ? `
        <div class="map-row-body">
          ${ports.length ? `
            <div class="map-ports-list">
              ${ports.map(p => `
                <div class="map-port-chip">
                  <strong>${escapeHtml(p.name)}</strong>
                  <span class="chip ${p.mode === "trunk" ? "indigo" : "accent"}">${escapeHtml(p.mode || "")}</span>
                  ${p.mode === "access" && p.access_vlan ? `<span class="chip">${escapeHtml(p.access_vlan)}</span>` : ""}
                  ${p.mode === "trunk" && p.allowed_vlans?.length ? `<span class="chip">${escapeHtml(p.allowed_vlans.join(", "))}</span>` : ""}
                  ${formatConnectedTo(p.connected_to) ? `<span class="muted mono" style="font-size:11px;">→ ${escapeHtml(formatConnectedTo(p.connected_to))}</span>` : ""}
                </div>
              `).join("")}
            </div>
          ` : `<div class="muted" style="font-size:13px;">No interfaces.</div>`}
          <div class="map-jump-row">
            <button class="map-jump-link" type="button" data-action="map-jump-hosts" data-host-id="${escapeHtml(id)}">View in Hosts tree →</button>
          </div>
        </div>
      ` : ""}
    `;
    return el;
  }

  const cards = [];
  mainOrder.forEach(id => {
    const el = buildCard(id);
    wrap.appendChild(el);
    cards.push({ id, el, isFloating: false });
  });
  let floatingLabel = null;
  if (floating.length) {
    floatingLabel = document.createElement("div");
    floatingLabel.className = "map-floating-label";
    floatingLabel.innerHTML = `<strong>Floating</strong> <span class="muted">· no documented connections</span>`;
    wrap.appendChild(floatingLabel);
    floating.forEach(id => {
      const el = buildCard(id);
      wrap.appendChild(el);
      cards.push({ id, el, isFloating: true });
    });
  }

  root.appendChild(wrap);

  const mainIndex = new Map();
  mainOrder.forEach((id, idx) => mainIndex.set(id, idx));

  requestAnimationFrame(() => {
    const W = wrap.clientWidth || 800;
    const RECT_W = Math.max(280, Math.round(W * 0.8));
    const RECT_X = Math.round((W - RECT_W) / 2);
    const ROW_GAP = 40;

    const mainCards = cards.filter(c => !c.isFloating);
    const floatingCards = cards.filter(c => c.isFloating);

    mainCards.forEach(c => { c.el.style.left = RECT_X + "px"; c.el.style.width = RECT_W + "px"; });
    floatingCards.forEach(c => { c.el.style.left = RECT_X + "px"; c.el.style.width = RECT_W + "px"; });
    if (floatingLabel) { floatingLabel.style.left = RECT_X + "px"; floatingLabel.style.width = RECT_W + "px"; }

    const mainHeights = mainCards.map(c => c.el.offsetHeight);
    const floatingHeights = floatingCards.map(c => c.el.offsetHeight);

    let y = 8;
    const positions = new Map();
    mainCards.forEach((c, i) => {
      const h = mainHeights[i];
      c.el.style.top = y + "px";
      positions.set(c.id, { x: RECT_X, y, w: RECT_W, h });
      y += h + ROW_GAP;
    });
    if (floatingLabel) {
      floatingLabel.style.top = y + "px";
      y += 28;
      floatingCards.forEach((c, i) => {
        const h = floatingHeights[i];
        c.el.style.top = y + "px";
        positions.set(c.id, { x: RECT_X, y, w: RECT_W, h });
        y += h + ROW_GAP;
      });
    }
    const totalH = y;
    wrap.style.height = totalH + "px";
    svg.setAttribute("viewBox", `0 0 ${W} ${totalH}`);
    svg.setAttribute("height", totalH);

    while (svg.firstChild) svg.removeChild(svg.firstChild);
    const frag = document.createDocumentFragment();
    mainOrder.forEach(id => {
      const aPos = positions.get(id);
      if (!aPos) return;
      const edges = adj.get(id) || [];
      const aIdx = mainIndex.get(id);
      edges.forEach((e, i) => {
        const bIdx = mainIndex.get(e.neighbor);
        if (aIdx == null || bIdx == null || aIdx >= bIdx) return;
        const bPos = positions.get(e.neighbor);
        if (!bPos) return;
        const offset = (i - (edges.length - 1) / 2) * 14;
        const x1 = aPos.x + aPos.w / 2 + offset;
        const y1 = aPos.y + aPos.h;
        const x2 = bPos.x + bPos.w / 2 + offset;
        const y2 = bPos.y;
        const dy = Math.max(20, (y2 - y1) / 2);
        const path = document.createElementNS(svgNS, "path");
        path.setAttribute("d", `M ${x1} ${y1} C ${x1} ${y1 + dy}, ${x2} ${y2 - dy}, ${x2} ${y2}`);
        path.setAttribute("class", "connector");
        frag.appendChild(path);
      });
    });
    svg.appendChild(frag);
  });
}

function renderMapHosts(root) {

  const childrenByParent = new Map();
  const roots = [];
  allIds.forEach(id => {
    const parent = state.hosts[id].hosted_on;
    if (parent && state.hosts[parent]) {
      if (!childrenByParent.has(parent)) childrenByParent.set(parent, []);
      childrenByParent.get(parent).push(id);

    let v = matchHost(id);

function downloadJson(obj, filename) {
  const json = JSON.stringify(obj, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function tsStamp() {
  return new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);

function continueImportFromParsed(parsed) {
  if (!parsed || typeof parsed !== "object") throw new Error("Top-level JSON must be an object");
  if (parsed.schemaVersion !== SCHEMA_VERSION) throw new Error("Unsupported schemaVersion — expected " + SCHEMA_VERSION);
  const networksLooksLikeMap = parsed.networks && typeof parsed.networks === "object" && !Array.isArray(parsed.networks);
  const isMulti = !!(networksLooksLikeMap && Object.keys(parsed.networks).length > 0 && (
    typeof parsed.activeNetworkId === "string" ||
    Object.values(parsed.networks).every(n =>
      n && typeof n === "object" && (("network" in n) || ("vlans" in n) || ("hosts" in n) || ("credentials" in n))
    )
  ));
  const isSingle = !isMulti && !!(parsed.network || parsed.vlans || parsed.hosts || parsed.credentials);
  if (!isMulti && !isSingle) throw new Error("File does not look like an inventory export");

  if (isMulti) {
    confirmDelete({
      title: "Replace all data?",
      message: `This will permanently overwrite the current ${Object.keys(data.networks).length} network(s) with ${Object.keys(parsed.networks).length} from the file. Export first if you want a backup — this cannot be undone.`,
      okLabel: "Replace all",
      onConfirm: () => {
        const importedCount = Object.keys(parsed.networks).length;
        data = normalizeData(parsed);
        state = data.networks[data.activeNetworkId];
        revealedCreds.clear();
        resetFilters();
        saveState();
        switchTab("dashboard");
        toast(`Imported ${importedCount} network(s)`, "success");
        reportDanglingRefs(validateAllNetworks(data));
      }
    });
  } else {
    openImportSingleChooser(parsed);
  }
}

$("#file-import").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (parsed && typeof parsed === "object"
        && parsed.kdf && parsed.cipher && parsed.data) {
      lastKdf = parsed.kdf;
      openPassphraseModal({
        onUnlock: async (pp) => {
          try {
            await Crypto.unlock(pp, parsed.kdf);
            const probe = findFirstBlob(parsed.data);
            if (probe) {
              await Crypto.decryptField(probe.blob, "__probe__");
              Crypto.clearCache("__probe__");
            }
            saveEnvelope({
              kdf: parsed.kdf,
              cipher: parsed.cipher,
              encrypted_fields: parsed.encrypted_fields
            });
            try {
              continueImportFromParsed(parsed.data);
            } catch (err) {
              toast("Import failed: " + err.message, "error");
            }
            return true;
          } catch {
            Crypto.lock();
            return "Incorrect passphrase";
          }
        },
        onCancel: () => {  }
      });
      return;
    }
    clearEnvelope();
    continueImportFromParsed(parsed);
  } catch (err) {
    toast("Import failed: " + err.message, "error");

    e.target.value = "";

});

function deepEqual(a, b) {
  if (a === b) return true;
  if (a === null || b === null) return a === b;
  if (typeof a !== "object" || typeof b !== "object") return false;
  const aArr = Array.isArray(a), bArr = Array.isArray(b);
  if (aArr !== bArr) return false;
  if (aArr) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) if (!deepEqual(a[i], b[i])) return false;
    return true;
  }
  const ak = Object.keys(a), bk = Object.keys(b);
  if (ak.length !== bk.length) return false;
  for (const k of ak) {
    if (!Object.prototype.hasOwnProperty.call(b, k)) return false;
    if (!deepEqual(a[k], b[k])) return false;
  }
  return true;
}

async function runSelfTest() {
  const SELFTEST_PASSPHRASE = "selftest";
  // Both fixtures are written in normalized shape, so the multi-network output of
  // normalizeData should be byte-equal to the original (modulo the single→multi wrap
  // for the empty fixture). That gives us two distinct guards:
  //   - fidelity: normalized1 vs the original input (catches dropped/renamed fields).
  //   - idempotency: normalized1 vs normalized2 (catches non-stable defaults / id gen).
  const tests = [
    { name: "empty fixture (single-network shape)", id: "fixture-empty", expectShape: "single" },
    { name: "full fixture (multi-network shape)",   id: "fixture-full",  expectShape: "multi"  }
  ];
  const results = [];
  for (const t of tests) {
    try {
      const el = document.getElementById(t.id);
      if (!el) throw new Error(`missing <script id="${t.id}">`);
      const raw = JSON.parse(el.textContent);
      const normalized1 = normalizeData(raw);
      // For the single-network input, normalizeData re-wraps it as multi-network with a
      // generated activeNetworkId; compare apples-to-apples by extracting the network.
      let fidelityRaw, fidelityOut;
      if (t.expectShape === "multi") {
        fidelityRaw = raw;
        fidelityOut = { schemaVersion: SCHEMA_VERSION, networks: normalized1.networks, activeNetworkId: normalized1.activeNetworkId };
      } else {
        const onlyId = Object.keys(normalized1.networks)[0];
        fidelityRaw = { ...raw };
        delete fidelityRaw.schemaVersion;
        fidelityOut = normalized1.networks[onlyId];
      }
      const fidelityOk = deepEqual(fidelityRaw, fidelityOut);
      const exported = JSON.parse(JSON.stringify(normalized1));
      const normalized2 = normalizeData(exported);
      const idempotentOk = deepEqual(normalized1, normalized2);
      const ok = fidelityOk && idempotentOk;
      const status = ok ? "PASS" : (!fidelityOk && !idempotentOk ? "FAIL (fidelity+idempotency)" : !fidelityOk ? "FAIL (fidelity)" : "FAIL (idempotency)");
      results.push({ name: t.name, status });
      if (!fidelityOk) {
        console.warn(`[selftest] ${t.name}: fidelity differs — a field was dropped or transformed by normalizeNetwork.`);
        console.log("input (post-unwrap):", fidelityRaw);
        console.log("normalized1 (post-unwrap):", fidelityOut);
      }
      if (!idempotentOk) {
        console.warn(`[selftest] ${t.name}: round-trip differs — normalize is not idempotent.`);
        console.log("normalized1:", normalized1);
        console.log("normalized2:", normalized2);
      }
    } catch (e) {
      results.push({ name: t.name, status: "ERROR", error: e.message });
      console.error(`[selftest] ${t.name}: ${e.message}`);
    }
  }

  const encryptedTestName = "encrypted fixture (envelope round-trip)";
  try {
    if (typeof crypto === "undefined" || !crypto.subtle) {
      results.push({ name: encryptedTestName, status: "SKIP (crypto.subtle unavailable)" });
    } else {
      const encEl = document.getElementById("fixture-encrypted");
      const fullEl = document.getElementById("fixture-full");
      if (!encEl) throw new Error('missing <script id="fixture-encrypted">');
      if (!fullEl) throw new Error('missing <script id="fixture-full"> (needed as the plaintext reference)');
      const envelope = JSON.parse(encEl.textContent);
      const plaintextRef = JSON.parse(fullEl.textContent);

      if (!envelope.kdf || !envelope.data) throw new Error("encrypted fixture missing kdf or data");

      // Save and restore Crypto state so the live session isn't affected.
      const wasUnlocked = Crypto.isUnlocked();
      const wasEncSession = Crypto.isEncryptedSession();
      Crypto.lock();

      await Crypto.unlock(SELFTEST_PASSPHRASE, envelope.kdf);

      let checked = 0;
      let mismatches = 0;
      const encNetworks = envelope.data.networks || {};
      const refNetworks = plaintextRef.networks || {};
      for (const [nid, net] of Object.entries(encNetworks)) {
        const refNet = refNetworks[nid];
        if (!refNet) throw new Error(`encrypted fixture network ${nid} missing from plaintext reference`);
        const encCreds = net.credentials || {};
        const refCreds = refNet.credentials || {};
        for (const [cid, cred] of Object.entries(encCreds)) {
          const refCred = refCreds[cid];
          if (!refCred) throw new Error(`encrypted fixture credential ${nid}/${cid} missing from plaintext reference`);
          const blob = cred.password;
          const expected = typeof refCred.password === "string" ? refCred.password : "";
          if (!Crypto.isEncryptedBlob(blob)) {
            if (blob !== expected) mismatches++;
            continue;
          }
          const got = await Crypto.decryptField(blob, `__selftest:${nid}:${cid}`);
          if (got !== expected) {
            mismatches++;
            console.warn(`[selftest] decrypted ${nid}/${cid} != plaintext reference`);
          }
          checked++;
        }
      }

      Crypto.lock();
      // Phase 1 doesn't expose a way to restore the previous derivedKey without the
      // original passphrase, so the best we can do is leave it locked. If the live
      // session was unlocked, the user will be re-prompted next reveal.
      void wasUnlocked; void wasEncSession;

      const okEnc = checked > 0 && mismatches === 0;
      results.push({
        name: encryptedTestName,
        status: okEnc ? "PASS" : (checked === 0 ? "FAIL (no blobs found)" : `FAIL (${mismatches} mismatch(es))`)
      });
    }
  } catch (e) {
    Crypto.lock();
    results.push({ name: encryptedTestName, status: "ERROR", error: e.message });
    console.error(`[selftest] ${encryptedTestName}: ${e.message}`);
  }

  const editRoundtripName = "edit-roundtrip (per-write fresh IV)";
  try {
    if (typeof crypto === "undefined" || !crypto.subtle || typeof crypto.subtle.encrypt !== "function") {
      results.push({ name: editRoundtripName, status: "SKIP (crypto.subtle unavailable)" });
    } else {
      const encEl = document.getElementById("fixture-encrypted");
      if (!encEl) throw new Error('missing <script id="fixture-encrypted">');
      const envelope = JSON.parse(encEl.textContent);
      if (!envelope.kdf) throw new Error("encrypted fixture missing kdf");

      Crypto.lock();
      await Crypto.unlock(SELFTEST_PASSPHRASE, envelope.kdf);

      const sample = "new-password-123";
      const blob1 = await Crypto.encryptField(sample);
      const blob2 = await Crypto.encryptField(sample);

      const fails = [];
      if (!Crypto.isEncryptedBlob(blob1) || !Crypto.isEncryptedBlob(blob2)) fails.push("encryptField did not return a {iv,ct} blob");
      const got1 = await Crypto.decryptField(blob1, "__selftest:edit1__");
      const got2 = await Crypto.decryptField(blob2, "__selftest:edit2__");
      Crypto.clearCache("__selftest:edit1__");
      Crypto.clearCache("__selftest:edit2__");
      if (got1 !== sample) fails.push("decrypted blob1 != plaintext");
      if (got2 !== sample) fails.push("decrypted blob2 != plaintext");
      if (blob1.iv === blob2.iv) fails.push("two encryptions produced identical IVs (nonce reuse)");

      Crypto.lock();

      results.push({
        name: editRoundtripName,
        status: fails.length === 0 ? "PASS" : `FAIL (${fails.join("; ")})`
      });
    }
  } catch (e) {
    Crypto.lock();
    results.push({ name: editRoundtripName, status: "ERROR", error: e.message });
    console.error(`[selftest] ${editRoundtripName}: ${e.message}`);
  }

  console.log("%cself-test results", "font-weight:bold;font-size:14px;");
  console.table(results);
  const allPassed = results.every(r => r.status === "PASS" || r.status.startsWith("SKIP"));
  console.log(
    `%c${allPassed ? "✓ all passed" : "✗ some failures"}`,
    `color:${allPassed ? "green" : "red"};font-weight:bold;`
  );
}

function startApp() {
  if (hasEncryptedBlobs(data)) {
    const env = readEnvelopeFromStorage();
    if (!env || !env.kdf) {
      toast("Encrypted data found in storage but envelope metadata is missing. Re-import the file to unlock.", "error");
      render();
      reportDanglingRefs(validateAllNetworks(data));
      return;
    }
    lastKdf = env.kdf;
    openPassphraseModal({
      onUnlock: async (pp) => {
        try {
          await Crypto.unlock(pp, env.kdf);
          render();
          reportDanglingRefs(validateAllNetworks(data));
          return true;
        } catch {
          Crypto.lock();
          return "Incorrect passphrase";
        }
      },
      onCancel: () => {
        render();
        reportDanglingRefs(validateAllNetworks(data));
      }
    });
    return;
  }
  render();
  saveState();
  reportDanglingRefs(validateAllNetworks(data));
}

startApp();

if (new URLSearchParams(location.search).get("selftest") === "1") {
  runSelfTest().catch(e => console.error("self-test failed:", e));
}
</script>
</body>
